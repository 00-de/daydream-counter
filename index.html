<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>DayDreamプラス 題目カウンター DX+</title>

<style>

body{
  margin:0;
  padding:20px;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffb6f9,#b5d7ff,#ffe59e);
  min-height:100vh;
  color:#222;
}

h1{
  text-align:center;
  font-size:28px;
  margin-bottom:20px;
}

.card{
  background:white;
  border-radius:24px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

button{
  border:none;
  padding:14px 18px;
  border-radius:16px;
  margin:6px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.startBtn{
  background:#00c853;
  color:white;
}

.resetBtn{
  background:#ff7043;
  color:white;
}

.saveBtn{
  background:#2979ff;
  color:white;
}

input,textarea{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid #ccc;
  margin-top:8px;
  margin-bottom:14px;
  font-size:16px;
  box-sizing:border-box;
}

.bar{
  height:28px;
  background:#ddd;
  border-radius:999px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00e676,#00b0ff,#ff00aa);
  transition:0.5s;
}

.percentText{
  font-size:20px;
  font-weight:bold;
}

.status{
  margin-top:10px;
  font-size:18px;
  font-weight:bold;
}

.running{
  color:#00c853;
}

.stop{
  color:#ff1744;
}

.achievement{
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  background:#fff3cd;
  font-weight:bold;
  animation:pop .6s ease;
}

.big{
  font-size:20px;
  color:#d50000;
}

@keyframes pop{

  0%{
    transform:scale(.7);
    opacity:0;
  }

  100%{
    transform:scale(1);
    opacity:1;
  }

}

</style>
</head>

<body>

<h1>🌈 DayDreamプラス 題目カウンター DX+</h1>

<!-- 状態 -->
<div class="card">

<div>
⏰ 現在時刻:
<span id="clock"></span>
</div>

<br>

<div>
🚀 開始時刻:
<span id="startTime">未開始</span>
</div>

<br>

<div>
📅 1日総数:
<span id="daily">0</span>
</div>

<div>
🗓️ 月総数:
<span id="monthly">0</span>
</div>

<div>
🏆 総数:
<span id="total">0</span>
</div>

<div class="status">
状態:
<span id="statusText" class="stop">停止中</span>
</div>

</div>

<!-- 操作 -->
<div class="card">

<button class="startBtn"
onclick="toggleCounter()"
id="startButton">
▶ 自動開始
</button>

<button class="resetBtn"
onclick="resetDay()">
📅 日リセット
</button>

<button class="resetBtn"
onclick="resetMonth()">
🗓️ 月リセット
</button>

<button class="resetBtn"
onclick="resetTotal()">
🏆 総リセット
</button>

</div>

<!-- 設定 -->
<div class="card">

<label>⚡ 1分間唱題数</label>
<input type="number" id="perMinute" value="60">

<label>🎯 1日目標</label>
<input type="number" id="goal" value="3000">

<div class="percentText">
📊 達成率:
<span id="percent">0</span>%
</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

</div>

<!-- 御祈念 -->
<div class="card">

<h2>🙏 御祈念</h2>

<textarea
id="prayer"
rows="5"
maxlength="200"
placeholder="御祈念を入力してください"></textarea>

<button class="saveBtn"
onclick="savePrayer()">
💾 保存
</button>

</div>

<!-- 演出 -->
<div class="card">

<h2>🌈 達成演出</h2>

<div id="achievementArea"></div>

</div>

<script>

const STORAGE='daydream_dx_final';

/* 達成保存キー */
const ACHIEVEMENT_KEY='daydream_achievements';

let state=JSON.parse(localStorage.getItem(STORAGE))||{

  daily:0,
  monthly:0,
  total:0,

  start:null,
  fixedStart:null,

  running:false,

  perMinute:60,

  dailyAchieved:false

};

/* 達成保存 */
let savedAchievements=
JSON.parse(
  localStorage.getItem(ACHIEVEMENT_KEY)
)||[];

/* 保存 */
function save(){

  localStorage.setItem(
    STORAGE,
    JSON.stringify(state)
  );

}

/* 達成保存 */
function saveAchievements(){

  localStorage.setItem(
    ACHIEVEMENT_KEY,
    JSON.stringify(savedAchievements)
  );

}

/* カウント */
function getCounts(){

  if(!state.running || !state.start){

    return{
      daily:state.daily,
      monthly:state.monthly,
      total:state.total
    };

  }

  const sec=(Date.now()-state.start)/1000;

  const add=sec*(state.perMinute/60);

  return{

    daily:state.daily+add,
    monthly:state.monthly+add,
    total:state.total+add

  };

}

/* UI更新 */
function updateUI(){

  const c=getCounts();

  document.getElementById('daily').innerText=
  Math.floor(c.daily);

  document.getElementById('monthly').innerText=
  Math.floor(c.monthly);

  document.getElementById('total').innerText=
  Math.floor(c.total);

  if(state.fixedStart){

    document.getElementById('startTime').innerText=
    new Date(state.fixedStart)
    .toLocaleString('ja-JP');

  }else{

    document.getElementById('startTime').innerText=
    '未開始';

  }

  const goal=
  Number(
    document.getElementById('goal').value||1
  );

  const percent=
  Math.min(
    100,
    Math.floor(c.daily/goal*100)
  );

  document.getElementById('percent').innerText=
  percent;

  document.getElementById('fill').style.width=
  percent+'%';

  checkDailyGoal(c);

  checkAchievements(c.total);

}

/* 開始停止 */
function toggleCounter(){

  state.perMinute=
  Number(
    document.getElementById('perMinute').value||60
  );

  if(!state.running){

    state.running=true;

    state.start=Date.now();

    state.fixedStart=Date.now();

    document.getElementById('statusText').innerText=
    'カウント中';

    document.getElementById('statusText').className=
    'running';

    document.getElementById('startButton').innerText=
    '⏹ 停止';

  }else{

    const c=getCounts();

    state.daily=c.daily;
    state.monthly=c.monthly;
    state.total=c.total;

    state.running=false;

    document.getElementById('statusText').innerText=
    '停止中';

    document.getElementById('statusText').className=
    'stop';

    document.getElementById('startButton').innerText=
    '▶ 自動開始';

  }

  save();

  updateUI();

}

/* 5秒自動保存 */
setInterval(()=>{

  if(state.running){

    const c=getCounts();

    state.daily=c.daily;
    state.monthly=c.monthly;
    state.total=c.total;

    state.start=Date.now();

    save();

  }

},5000);

/* 御祈念保存 */
function savePrayer(){

  const val=
  document.getElementById('prayer').value;

  localStorage.setItem(
    'prayer',
    val
  );

  alert("🙏 御祈念を保存しました");

}

/* 🌈達成追加 */
function addAchievement(id,message,big=false){

  if(savedAchievements.includes(id)){
    return;
  }

  savedAchievements.push(id);

  saveAchievements();

  const div=document.createElement('div');

  div.id=id;

  div.className=
  big
  ? 'achievement big'
  : 'achievement';

  div.innerHTML=message;

  document
  .getElementById('achievementArea')
  .prepend(div);

}

/* 保存済み演出復元 */
function restoreAchievements(){

  savedAchievements.forEach(id=>{

    if(id==='dailyGoal'){

      addVisual(
        id,
        '🌅 1日目標達成お疲れ様です。自分を労わって明日からも頑張りましょう(^^)v',
        true
      );

    }

    if(id==='ach10000'){
      addVisual(id,'🥁 大地：おめでとう～よくやったね☺');
    }

    if(id==='ach50000'){
      addVisual(id,'🎀 葵：おめでとう～お疲れ様です(#^.^#)');
    }

    if(id==='ach100000'){
      addVisual(id,'🎸 蓮：やったね(^^♪地道に進もう');
    }

    if(id==='ach200000'){
      addVisual(id,'🎤 結衣：やった～私の歌で元気を送るね');
    }

    if(id==='ach500000'){
      addVisual(id,'🎹 悠真：さすが～未来のリーダー');
    }

    if(id==='ach750000'){
      addVisual(id,'✨ 美琴：あともう少しで100万遍');
    }

    if(id==='ach1000000'){
      addVisual(
        id,
        '🏆 全員：やったねやったよ～100万遍あげられたのはあなた自身の称号だよ✨',
        true
      );
    }

  });

}

/* 表示専用 */
function addVisual(id,message,big=false){

  if(document.getElementById(id)){
    return;
  }

  const div=document.createElement('div');

  div.id=id;

  div.className=
  big
  ? 'achievement big'
  : 'achievement';

  div.innerHTML=message;

  document
  .getElementById('achievementArea')
  .prepend(div);

}

/* 🌅1日目標 */
function checkDailyGoal(c){

  const goal=
  Number(
    document.getElementById('goal').value||1
  );

  if(
    !state.dailyAchieved &&
    c.daily>=goal
  ){

    state.dailyAchieved=true;

    save();

    addAchievement(
      'dailyGoal',
      '🌅 1日目標達成お疲れ様です。自分を労わって明日からも頑張りましょう(^^)v',
      true
    );

  }

}

/* 🌈段階演出 */
function checkAchievements(total){

  if(total>=10000){

    addAchievement(
      'ach10000',
      '🥁 大地：おめでとう～よくやったね☺'
    );

  }

  if(total>=50000){

    addAchievement(
      'ach50000',
      '🎀 葵：おめでとう～お疲れ様です(#^.^#)'
    );

  }

  if(total>=100000){

    addAchievement(
      'ach100000',
      '🎸 蓮：やったね(^^♪地道に進もう'
    );

  }

  if(total>=200000){

    addAchievement(
      'ach200000',
      '🎤 結衣：やった～私の歌で元気を送るね'
    );

  }

  if(total>=500000){

    addAchievement(
      'ach500000',
      '🎹 悠真：さすが～未来のリーダー'
    );

  }

  if(total>=750000){

    addAchievement(
      'ach750000',
      '✨ 美琴：あともう少しで100万遍'
    );

  }

  if(total>=1000000){

    addAchievement(
      'ach1000000',
      '🏆 全員：やったねやったよ～100万遍あげられたのはあなた自身の称号だよ✨',
      true
    );

  }

}

/* リセット */
function resetDay(){

  state.daily=0;

  state.dailyAchieved=false;

  save();

  savedAchievements=[];

  saveAchievements();

  document
  .getElementById('achievementArea')
  .innerHTML='';

  updateUI();

}

function resetMonth(){

  state.monthly=0;

  save();

  updateUI();

}

function resetTotal(){

  state.total=0;

  save();

  savedAchievements=[];

  saveAchievements();

  document
  .getElementById('achievementArea')
  .innerHTML='';

  updateUI();

}

/* 時計 */
setInterval(()=>{

  document.getElementById('clock').innerText=
  new Date().toLocaleString('ja-JP');

  updateUI();

},1000);

/* 御祈念欄空白固定 */
document.getElementById('prayer').value='';

/* 演出復元 */
restoreAchievements();

updateUI();

</script>

</body>
</html>
