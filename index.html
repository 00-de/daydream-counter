<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>DayDreamプラス 題目カウンター DX+</title>

<style>

body{
  margin:0;
  padding:20px;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffb6f9,#b5d7ff,#ffe59e);
  min-height:100vh;
  color:#222;
}

h1{
  text-align:center;
  font-size:28px;
  margin-bottom:20px;
}

.card{
  background:white;
  border-radius:24px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

button{
  border:none;
  padding:14px 18px;
  border-radius:16px;
  margin:6px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.startBtn{
  background:#00c853;
  color:white;
}

.resetBtn{
  background:#ff7043;
  color:white;
}

.saveBtn{
  background:#2979ff;
  color:white;
}

.deleteBtn{
  background:#d50000;
  color:white;
}

input,textarea{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid #ccc;
  margin-top:8px;
  margin-bottom:14px;
  font-size:16px;
  box-sizing:border-box;
}

.bar{
  height:28px;
  background:#ddd;
  border-radius:999px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00e676,#00b0ff,#ff00aa);
  transition:0.5s;
}

.percentText{
  font-size:20px;
  font-weight:bold;
}

.status{
  margin-top:10px;
  font-size:18px;
  font-weight:bold;
}

.running{
  color:#00c853;
}

.stop{
  color:#ff1744;
}

.achievement{
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  background:#fff3cd;
  font-weight:bold;
  animation:pop .6s ease;
}

.big{
  font-size:20px;
  color:#d50000;
}

.historyItem{
  margin-top:12px;
  padding:12px;
  border-radius:14px;
  background:#f5f5f5;
}

@keyframes pop{

  0%{
    transform:scale(.7);
    opacity:0;
  }

  100%{
    transform:scale(1);
    opacity:1;
  }

}

</style>
</head>

<body>

<h1>🌈 DayDreamプラス 題目カウンター DX+</h1>

<!-- 状態 -->
<div class="card">

<div>
⏰ 現在時刻:
<span id="clock"></span>
</div>

<br>

<div>
🚀 開始時刻:
<span id="startTime">未開始</span>
</div>

<br>

<div>
📅 1日総数:
<span id="daily">0</span>
</div>

<div>
🗓️ 月総数:
<span id="monthly">0</span>
</div>

<div>
🏆 総数:
<span id="total">0</span>
</div>

<div class="status">
状態:
<span id="statusText" class="stop">停止中</span>
</div>

</div>

<!-- 操作 -->
<div class="card">

<button class="startBtn"
onclick="toggleCounter()"
id="startButton">
▶ 自動開始
</button>

<button class="resetBtn"
onclick="resetDay()">
📅 日リセット
</button>

<button class="resetBtn"
onclick="resetMonth()">
🗓️ 月リセット
</button>

<button class="resetBtn"
onclick="resetTotal()">
🏆 総リセット
</button>

</div>

<!-- 設定 -->
<div class="card">

<label>⚡ 1分間唱題数</label>
<input type="number" id="perMinute" value="60">

<label>🎯 1日目標</label>
<input type="number" id="goal" value="3000">

<div class="percentText">
📊 達成率:
<span id="percent">0</span>%
</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

</div>

<!-- 御祈念 -->
<div class="card">

<h2>🙏 御祈念</h2>

<textarea
id="prayer"
rows="5"
maxlength="300"
placeholder="御祈念入力"></textarea>

<button class="saveBtn"
onclick="savePrayer()">
💾 保存
</button>

<button class="deleteBtn"
onclick="clearPrayer()">
🗑️ 入力削除
</button>

</div>

<!-- 履歴 -->
<div class="card">

<h2>📝 過去の御祈念履歴</h2>

<div id="historyArea">
まだ保存されていません
</div>

</div>

<!-- 達成演出 -->
<div class="card">

<h2>🌈 達成演出</h2>

<div id="achievementArea"></div>

</div>

<script>

const STORAGE='daydream_dx_final';
const ACHIEVEMENT_KEY='daydream_achievements';
const PRAYER_KEY='prayerHistory';

let state=JSON.parse(localStorage.getItem(STORAGE))||{

  daily:0,
  monthly:0,
  total:0,
  start:null,
  fixedStart:null,
  running:false,
  perMinute:60,
  dailyAchieved:false

};

let savedAchievements=
JSON.parse(
  localStorage.getItem(ACHIEVEMENT_KEY)
)||[];

/* 保存 */
function save(){

  localStorage.setItem(
    STORAGE,
    JSON.stringify(state)
  );

}

/* 達成保存 */
function saveAchievements(){

  localStorage.setItem(
    ACHIEVEMENT_KEY,
    JSON.stringify(savedAchievements)
  );

}

/* カウント */
function getCounts(){

  if(!state.running || !state.start){

    return{
      daily:state.daily,
      monthly:state.monthly,
      total:state.total
    };

  }

  const sec=
  (Date.now()-state.start)/1000;

  const add=
  sec*(state.perMinute/60);

  return{

    daily:state.daily+add,
    monthly:state.monthly+add,
    total:state.total+add

  };

}

/* UI更新 */
function updateUI(){

  const c=getCounts();

  document.getElementById('daily').innerText=
  Math.floor(c.daily);

  document.getElementById('monthly').innerText=
  Math.floor(c.monthly);

  document.getElementById('total').innerText=
  Math.floor(c.total);

  /* 修正部分 */
  if(state.fixedStart){

    document.getElementById('startTime').innerText=
    new Date(state.fixedStart)
    .toLocaleString('ja-JP');

  }else{

    document.getElementById('startTime').innerText=
    '未開始';

  }

  const goal=
  Number(
    document.getElementById('goal').value||1
  );

  const percent=
  Math.min(
    100,
    Math.floor(c.daily/goal*100)
  );

  document.getElementById('percent').innerText=
  percent;

  document.getElementById('fill').style.width=
  percent+'%';

  checkDailyGoal(c);

  checkAchievements(c.total);

}

/* 開始停止 */
function toggleCounter(){

  state.perMinute=
  Number(
    document.getElementById('perMinute').value||60
  );

  if(!state.running){

    state.running=true;

    state.start=Date.now();

    /* ←ここ修正 */
    state.fixedStart=Date.now();

    document.getElementById('statusText').innerText=
    'カウント中';

    document.getElementById('statusText').className=
    'running';

    document.getElementById('startButton').innerText=
    '⏹ 停止';

  }else{

    const c=getCounts();

    state.daily=c.daily;
    state.monthly=c.monthly;
    state.total=c.total;

    state.running=false;

    document.getElementById('statusText').innerText=
    '停止中';

    document.getElementById('statusText').className=
    'stop';

    document.getElementById('startButton').innerText=
    '▶ 自動開始';

  }

  save();

  updateUI();

}

/* 5秒保存 */
setInterval(()=>{

  if(state.running){

    const c=getCounts();

    state.daily=c.daily;
    state.monthly=c.monthly;
    state.total=c.total;

    state.start=Date.now();

    save();

  }

},5000);

/* 御祈念保存 */
function savePrayer(){

  const text=
  document.getElementById('prayer').value.trim();

  if(!text){

    alert("御祈念入力してください");

    return;

  }

  const now=new Date();

  const item={

    date:now.toLocaleDateString('ja-JP'),
    time:now.toLocaleTimeString('ja-JP'),
    text:text

  };

  let history=
  JSON.parse(
    localStorage.getItem(PRAYER_KEY)
  )||[];

  history.unshift(item);

  localStorage.setItem(
    PRAYER_KEY,
    JSON.stringify(history)
  );

  alert("🙏 御祈念を保存しました");

  document.getElementById('prayer').value='';

  renderHistory();

}

/* 入力削除 */
function clearPrayer(){

  document.getElementById('prayer').value='';

}

/* 履歴表示 */
function renderHistory(){

  const area=
  document.getElementById('historyArea');

  let history=
  JSON.parse(
    localStorage.getItem(PRAYER_KEY)
  )||[];

  if(history.length===0){

    area.innerHTML=
    'まだ保存されていません';

    return;

  }

  area.innerHTML='';

  history.forEach(item=>{

    const div=
    document.createElement('div');

    div.className='historyItem';

    div.innerHTML=`

      <div>
      📅 ${item.date}
      ⏰ ${item.time}
      </div>

      <div style="margin-top:8px;">
      🙏 ${item.text}
      </div>

    `;

    area.appendChild(div);

  });

}

/* 達成追加 */
function addAchievement(id,message,big=false){

  if(savedAchievements.includes(id)){
    return;
  }

  savedAchievements.push(id);

  saveAchievements();

  const div=
  document.createElement('div');

  div.id=id;

  div.className=
  big
  ? 'achievement big'
  : 'achievement';

  div.innerHTML=message;

  document
  .getElementById('achievementArea')
  .prepend(div);

}

/* 表示専用 */
function addVisual(id,message,big=false){

  if(document.getElementById(id)){
    return;
  }

  const div=
  document.createElement('div');

  div.id=id;

  div.className=
  big
  ? 'achievement big'
  : 'achievement';

  div.innerHTML=message;

  document
  .getElementById('achievementArea')
  .prepend(div);

}

/* 演出復元 */
function restoreAchievements(){

  savedAchievements.forEach(id=>{

    if(id==='dailyGoal'){

      addVisual(
        id,
        '🌅 1日目標達成お疲れ様です。自分を労わって明日からも頑張りましょう(^^)v',
        true
      );

    }

  });

}

/* 1日目標 */
function checkDailyGoal(c){

  const goal=
  Number(
    document.getElementById('goal').value||1
  );

  if(
    !state.dailyAchieved &&
    c.daily>=goal
  ){

    state.dailyAchieved=true;

    save();

    addAchievement(
      'dailyGoal',
      '🌅 1日目標達成お疲れ様です。自分を労わって明日からも頑張りましょう(^^)v',
      true
    );

  }

}

/* 段階演出 */
function checkAchievements(total){

  if(total>=10000){

    addAchievement(
      'ach10000',
      '🥁 大地：おめでとう～よくやったね☺'
    );

  }

}

/* リセット */
function resetDay(){

  state.daily=0;

  state.dailyAchieved=false;

  save();

  updateUI();

}

function resetMonth(){

  state.monthly=0;

  save();

  updateUI();

}

function resetTotal(){

  state.total=0;

  save();

  savedAchievements=[];

  saveAchievements();

  document
  .getElementById('achievementArea')
  .innerHTML='';

  updateUI();

}

/* 時計 */
setInterval(()=>{

  document.getElementById('clock').innerText=
  new Date().toLocaleString('ja-JP');

  updateUI();

},1000);

/* 初期表示 */
restoreAchievements();

renderHistory();

updateUI();

</script>

</body>
</html>
