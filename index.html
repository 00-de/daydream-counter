<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>題目カウンター DayDreamプラス DX+</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffb6f9,#b5d7ff,#ffe59e);
}

.header{
  position:sticky;
  top:0;
  padding:12px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
  background:linear-gradient(135deg,#ffb6f9,#b5d7ff,#ffe59e);
  z-index:999;
}

.card{
  background:white;
  margin:12px;
  padding:14px;
  border-radius:14px;
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

button{
  padding:10px;
  margin:4px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.startBtn{background:#00c853;color:white;}
.resetBtn{background:#ff7043;color:white;}
.navBtn{background:#7c4dff;color:white;}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  box-sizing:border-box;
}

.bar{
  height:18px;
  background:#ddd;
  border-radius:999px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00e676,#00b0ff,#ff00aa);
}

.achievement{
  margin-top:8px;
  padding:10px;
  background:#fff3cd;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
🌈 題目カウンター DayDreamプラス DX+
</div>

<div id="main">

<div class="card">
⏰ <span id="clock"></span><br>
🚀 開始: <span id="startTime">未開始</span><br>
📅 日: <span id="daily"></span><br>
🗓️ 月: <span id="monthly"></span><br>
🏆 総: <span id="total"></span>
</div>

<div class="card">

<button class="startBtn" onclick="toggle()" id="btn">▶開始</button>
<button class="resetBtn" onclick="resetDay()">日リセット</button>
<button class="resetBtn" onclick="resetMonth()">月リセット</button>
<button class="resetBtn" onclick="resetTotal()">総リセット</button>
<button class="navBtn" onclick="showPrayer()">御祈念</button>

</div>

<div class="card">

1分あたり
<input id="perMinute" type="number" value="60">

目標
<input id="goal" type="number" value="3000">

達成率 <span id="percent">0</span>%

<div class="bar"><div class="fill" id="fill"></div></div>

</div>

<div class="card">
<h3>🌈 段階演出</h3>
<div id="achievement"></div>
</div>

</div>

<!-- 🌸御祈念 -->
<div id="prayerPage" style="display:none">

<div class="card">
<h3>🙏御祈念</h3>

<textarea id="prayer" maxlength="300"></textarea>

<button class="startBtn" onclick="savePrayer()">保存</button>
<button class="navBtn" onclick="back()">戻る</button>

<div id="prayerList"></div>
</div>

</div>

<script>

/* ================= STORAGE ================= */
const STORAGE="dx_stable_v1";
const PRAYER="dx_prayer_v1";

let state=JSON.parse(localStorage.getItem(STORAGE))||{
  daily:0,
  monthly:0,
  total:0,
  start:0,
  fixedStart:0,
  running:false,
  perMinute:60,
  dailyAchieved:false
};

function save(){
  localStorage.setItem(STORAGE,JSON.stringify(state));
}

/* ================= COUNT ================= */
function get(){
  if(!state.running)return state;

  let sec=(Date.now()-state.start)/1000;
  let add=sec*(state.perMinute/60);

  return{
    daily:state.daily+add,
    monthly:state.monthly+add,
    total:state.total+add
  };
}

/* ================= UI ================= */
function ui(){

  let c=get();

  document.getElementById("daily").innerText=Math.floor(c.daily);
  document.getElementById("monthly").innerText=Math.floor(c.monthly);
  document.getElementById("total").innerText=Math.floor(c.total);

  document.getElementById("startTime").innerText=
    state.fixedStart ? new Date(state.fixedStart).toLocaleString() : "未開始";

  let goal=Number(document.getElementById("goal").value||1);
  let p=Math.min(100,Math.floor(c.daily/goal*100));

  document.getElementById("percent").innerText=p;
  document.getElementById("fill").style.width=p+"%";

  checkDaily(c);
  checkStage(c.total);

  save();
}

/* ================= CLOCK ================= */
setInterval(()=>{
  document.getElementById("clock").innerText=new Date().toLocaleString();
  ui();
},1000);

/* ================= START ================= */
function toggle(){

  state.perMinute=Number(document.getElementById("perMinute").value||60);

  if(!state.running){
    state.running=true;
    state.start=Date.now();
    state.fixedStart=state.fixedStart||Date.now();
    document.getElementById("btn").innerText="停止";
  }else{
    let c=get();
    state.daily=c.daily;
    state.monthly=c.monthly;
    state.total=c.total;
    state.running=false;
    document.getElementById("btn").innerText="開始";
  }

  save();
}

/* ================= RESET ================= */
function resetDay(){state.daily=0;state.dailyAchieved=false;save();}
function resetMonth(){state.monthly=0;save();}
function resetTotal(){state.total=0;save();}

/* ================= DAILY ================= */
function checkDaily(c){

  let goal=Number(document.getElementById("goal").value||1);

  if(state.dailyAchieved) return;

  if(c.daily>=goal){
    state.dailyAchieved=true;
    save();
    add("🌅 1日目標達成！");
  }
}

/* ================= STAGE (完全維持＋強化) ================= */
let fired={};

function fire(id,fn){
  if(fired[id]) return;
  fired[id]=true;
  fn();
}

function checkStage(t){

  fire("10k",()=>{if(t>=10000)add("🥁 大地：ここからだね");});
  fire("50k",()=>{if(t>=50000)add("🎀 葵：いい感じ");});
  fire("100k",()=>{if(t>=100000)add("🎸 蓮：積み重ね");});
  fire("200k",()=>{if(t>=200000)add("🎤 結衣：応援してる");});
  fire("500k",()=>{if(t>=500000)add("🎹 悠真：すごい進化");});

  fire("1m",()=>{
    if(t>=1000000){
      add("🏆 100万達成！");
      add("🌌 DayDream覚醒モード");
    }
  });

}

/* ================= ADD ================= */
function add(text){
  let box=document.getElementById("achievement");
  let d=document.createElement("div");
  d.className="achievement";
  d.textContent=text;
  box.prepend(d);
}

/* ================= INIT ================= */
setInterval(()=>ui(),1000);

</script>

</body>
</html>
