<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DayDreamプラス 題目カウンター DX</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ff66cc">

<style>

body{
margin:0;
padding:20px;
font-family:sans-serif;
background:
linear-gradient(
135deg,
#ffb6f9,
#b5d7ff,
#ffe59e
);
min-height:100vh;
color:#222;
}

h1{
text-align:center;
font-size:32px;
margin-bottom:20px;
}

.card{
background:white;
border-radius:24px;
padding:18px;
margin-bottom:18px;
box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

button{
border:none;
padding:14px 18px;
border-radius:16px;
margin:6px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.startBtn{
background:#00c853;
color:white;
}

.stopBtn{
background:#ff1744;
color:white;
}

.resetBtn{
background:#ff7043;
color:white;
}

.saveBtn{
background:#2979ff;
color:white;
}

input,textarea{
width:100%;
padding:12px;
border-radius:14px;
border:1px solid #ccc;
margin-top:8px;
margin-bottom:14px;
font-size:16px;
box-sizing:border-box;
}

.bar{
height:28px;
background:#ddd;
border-radius:999px;
overflow:hidden;
margin-top:10px;
}

.fill{
height:100%;
width:0%;
background:
linear-gradient(
90deg,
#00e676,
#00b0ff,
#ff00aa
);
transition:0.5s;
}

.percentText{
font-size:22px;
font-weight:bold;
}

.achievement{
margin-top:12px;
padding:14px;
border-radius:16px;
background:#fff3cd;
font-weight:bold;
font-size:18px;
animation:fadein 1s;
}

.big{
font-size:24px;
color:#ff1744;
}

img{
width:100%;
border-radius:18px;
margin-top:12px;
}

@keyframes fadein{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<h1>🌈 DayDreamプラス 題目カウンター DX</h1>

<div class="card">

<div>
⏰ 現在時刻:
<span id="clock"></span>
</div>

<br>

<div>
🚀 開始時刻:
<span id="startTime">未開始</span>
</div>

<br>

<div>
📅 1日総数:
<span id="daily">0</span>
</div>

<br>

<div>
🗓️ 月総数:
<span id="monthly">0</span>
</div>

<br>

<div>
🏆 総数:
<span id="total">0</span>
</div>

</div>

<div class="card">

<label>⚡ 1分間唱題数</label>

<input
type="number"
id="perMinute"
value="60"

>

<label>🎯 1時間唱題目標</label>

<input
type="number"
id="goal"
value="3000"

>

<div class="percentText">

📊 達成率: <span id="percent">0</span>%

</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

</div>

<div class="card">

<button
class="startBtn"
onclick="toggleCounter()"
id="startButton"

>

▶ 自動開始 </button>

<button
class="resetBtn"
onclick="resetDay()"

>

📅 日リセット </button>

<button
class="resetBtn"
onclick="resetMonth()"

>

🗓️ 月リセット </button>

<button
class="resetBtn"
onclick="resetTotal()"

>

🏆 総リセット </button>

</div>

<div class="card">

<h2>🙏 御祈念入力</h2>

<textarea
id="prayer"
rows="5"
maxlength="200"
placeholder="御祈念を入力..."
></textarea>

<button
class="saveBtn"
onclick="savePrayer()"

>

💾 御祈念保存 </button>

<div id="saveMessage"></div>

</div>

<div class="card">

<h2>🌈 DayDream達成演出</h2>

<div id="achievementArea"></div>

</div>

<script>

const STORAGE='daydream_dx_counter';

let state =
JSON.parse(
localStorage.getItem(STORAGE)
)
|| {

daily:0,
monthly:0,
total:0,
hour:0,
start:null,
auto:false

};

let timer=null;

function save(){

localStorage.setItem(
STORAGE,
JSON.stringify(state)
);

}

function updateUI(){

document.getElementById('daily').innerText =
Math.floor(state.daily);

document.getElementById('monthly').innerText =
Math.floor(state.monthly);

document.getElementById('total').innerText =
Math.floor(state.total);

if(state.start){

document.getElementById('startTime').innerText =
new Date(state.start)
.toLocaleString('ja-JP');

}

const goal =
Number(
document.getElementById('goal').value
|| 1
);

const percent =
Math.min(
100,
Math.floor(
(state.hour/goal)*100
)
);

document.getElementById('percent').innerText =
percent;

document.getElementById('fill').style.width =
percent + '%';

save();

checkAchievements();

}

function tick(){

const perMinute =
Number(
document.getElementById('perMinute').value
|| 60
);

const add =
perMinute / 60;

state.daily += add;
state.monthly += add;
state.total += add;
state.hour += add;

updateUI();

}

function toggleCounter(){

state.auto=!state.auto;

if(state.auto){

if(!state.start){

state.start=Date.now();

}

timer=setInterval(
tick,
1000
);

document.getElementById(
'startButton'
).innerText='⏹ 停止';

}else{

clearInterval(timer);

document.getElementById(
'startButton'
).innerText='▶ 自動開始';

}

save();

}

function resetDay(){

state.daily=0;
state.hour=0;

updateUI();

}

function resetMonth(){

state.monthly=0;
state.hour=0;

updateUI();

}

function resetTotal(){

state.total=0;
state.hour=0;

updateUI();

}

function savePrayer(){

const prayer =
document.getElementById(
'prayer'
).value;

localStorage.setItem(
'daydream_prayer',
prayer
);

document.getElementById(
'saveMessage'
).innerHTML =
'✨御祈念を保存しました✨';

}

function checkAchievements(){

const area =
document.getElementById(
'achievementArea'
);

let html='';

if(state.total >= 10000){

html += `
<div class="achievement big">
🎆 1万遍達成！
</div>
`;

}

if(state.total >= 50000){

html += `
<div class="achievement">
🥁 大地
「最高の勢いだ！」
</div>
`;

}

if(state.total >= 100000){

html += `
<div class="achievement">
🎤 結衣
「ここからもっと輝こう！」
</div>
`;

}

if(state.total >= 200000){

html += `
<div class="achievement">
🎸 蓮
「最高の流れ来てる！」
</div>
`;

}

if(state.total >= 400000){

html += `
<div class="achievement">
🎀 葵
「夢へ進もう！」
</div>
`;

}

if(state.total >= 500000){

html += `
<div class="achievement">
🎹 悠真
「本当にすごい！」
</div>
`;

}

if(state.total >= 700000){

html += `
<div class="achievement">
🌈 DayDreamプラス全員
「奇跡を超えていこう！」
</div>
`;

}

if(state.total >= 800000){

html += `
<div class="achievement">
✨ 月城美琴
「未来は輝いてる！」
</div>
`;

}

if(state.total >= 900000){

html += `
<div class="achievement">
💫 月城美琴＆結衣
「一緒に夢を叶えよう！」
</div>
`;

}

if(state.total >= 1000000){

html += `
<div class="achievement big">
🏆 100万遍達成！！
DayDreamプラス完全制覇！！
</div>
`;

}

area.innerHTML=html;

}

window.addEventListener(
'load',
()=>{

const savedPrayer =
localStorage.getItem(
'daydream_prayer'
);

if(savedPrayer){

document.getElementById(
'prayer'
).value=savedPrayer;

}

if(state.auto){

toggleCounter();

}

}
);

setInterval(()=>{

document.getElementById(
'clock'
).innerText =
new Date()
.toLocaleString('ja-JP');

},1000);

if('wakeLock' in navigator){

navigator.wakeLock.request('screen')
.catch(()=>{});

}

updateUI();

</script>

</body>
</html>
