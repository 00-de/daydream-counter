<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>題目カウンター DayDreamプラス DX+ 完全版</title>

<style>

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffb6f9,#b5d7ff,#ffe59e);
  min-height:100vh;
}

.header{
  position:sticky;
  top:0;
  padding:14px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  background:rgba(255,255,255,0.4);
  backdrop-filter:blur(8px);
  z-index:999;
}

.card{
  background:white;
  margin:12px;
  padding:14px;
  border-radius:16px;
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

button{
  border:none;
  border-radius:12px;
  padding:12px;
  margin:4px;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
}

.startBtn{
  background:#00c853;
  color:white;
}

.resetBtn{
  background:#ff7043;
  color:white;
}

.navBtn{
  background:#7c4dff;
  color:white;
}

.quizBtn{
  background:#00acc1;
  color:white;
}

input,textarea{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

.bar{
  height:18px;
  background:#ddd;
  border-radius:999px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00e676,#00b0ff,#ff00aa);
}

.ach{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:#fff3cd;
  line-height:1.8;
}

.quizItem{
  background:#f7fbff;
  padding:12px;
  border-radius:12px;
  margin-top:12px;
}

.quizQuestion{
  font-weight:bold;
  margin-bottom:10px;
  line-height:1.8;
}

.choiceBtn{
  display:block;
  width:100%;
  text-align:left;
  background:#eef7ff;
  color:#333;
  margin-top:8px;
}

.choiceBtn.correct{
  background:#c8e6c9;
  border:2px solid #2e7d32;
}

.choiceBtn.wrong{
  background:#ffcdd2;
  border:2px solid #c62828;
}

.quizResult{
  margin-top:14px;
  padding:12px;
  border-radius:12px;
  background:#e8f5e9;
  line-height:1.8;
  font-weight:bold;
}

.space{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  overflow:hidden;
  z-index:9999;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  animation:move 3s linear infinite;
}

@keyframes move{
  from{
    transform:translateY(0);
    opacity:1;
  }
  to{
    transform:translateY(800px);
    opacity:0;
  }
}

.flash{
  animation:flash 0.6s infinite;
}

@keyframes flash{
  0%{filter:brightness(1);}
  50%{filter:brightness(1.8);}
  100%{filter:brightness(1);}
}

.shake{
  animation:shake 0.3s infinite;
}

@keyframes shake{
  0%{transform:translate(0,0);}
  25%{transform:translate(2px,1px);}
  50%{transform:translate(-2px,-1px);}
  75%{transform:translate(1px,-2px);}
  100%{transform:translate(0,0);}
}

.original{
  margin-top:8px;
  font-size:12px;
  color:#666;
}

</style>
</head>

<body>

<div id="space" class="space"></div>

<div class="header">
🌈 題目カウンター DayDreamプラス DX+ 完全版
</div>

<div id="main">

<div class="card">

⏰ <span id="clock"></span><br>
🚀 開始時刻: <span id="startTime">未開始</span><br>
📅 日: <span id="daily">0</span><br>
🗓️ 月: <span id="monthly">0</span><br>
🏆 総: <span id="total">0</span><br>
🧠 クイズ最高点: <span id="bestScore">0</span>/5

</div>

<div class="card">

<button class="startBtn" onclick="toggle()" id="btn">
▶開始
</button>

<button class="resetBtn" onclick="resetDay()">
日リセット
</button>

<button class="resetBtn" onclick="resetMonth()">
月リセット
</button>

<button class="resetBtn" onclick="resetTotal()">
総リセット
</button>

<button class="navBtn" onclick="openPrayer()">
🙏 御祈念
</button>

<button class="quizBtn" onclick="openQuiz()">
🧠 クイズ
</button>

</div>

<div class="card">

1分あたり

<input id="per" type="number" value="60">

1日の目標

<input id="goal" type="number" value="3000">

達成率 <span id="percent">0</span>%

<div class="bar">
<div class="fill" id="fill"></div>
</div>

</div>

<div class="card">
<h3>🌈 段階演出</h3>
<div id="ach"></div>
</div>

</div>

<!-- 御祈念 -->

<div id="prayerPage" style="display:none">

<div class="card">

<h3>🙏 御祈念</h3>

<textarea id="prayer"></textarea>

<button class="startBtn" onclick="savePrayer()">
保存
</button>

<button class="navBtn" onclick="backHome()">
戻る
</button>

<div id="prayerList"></div>

</div>

</div>

<!-- クイズ -->

<div id="quizPage" style="display:none">

<div class="card">

<h3>🧠 インターネットクイズ</h3>

<div id="quizList"></div>

<button class="startBtn" onclick="submitQuiz()">
答え合わせ
</button>

<button class="quizBtn" onclick="generateQuiz()">
問題更新
</button>

<button class="navBtn" onclick="backHome()">
戻る
</button>

<div id="quizResult"></div>

</div>

</div>

<script>

/* ================= 保存キー ================= */

const KEY="ddd_counter_final";
const PRAY="ddd_prayer_final";
const QUIZ="ddd_quiz_final";
const STAGE="ddd_stage_final";

/* ================= DOM ================= */

const daily=document.getElementById("daily");
const monthly=document.getElementById("monthly");
const total=document.getElementById("total");
const clock=document.getElementById("clock");
const btn=document.getElementById("btn");
const startTime=document.getElementById("startTime");
const fill=document.getElementById("fill");
const percent=document.getElementById("percent");
const goal=document.getElementById("goal");
const per=document.getElementById("per");
const ach=document.getElementById("ach");
const space=document.getElementById("space");

const prayer=document.getElementById("prayer");
const prayerList=document.getElementById("prayerList");

const quizList=document.getElementById("quizList");
const quizResult=document.getElementById("quizResult");
const bestScore=document.getElementById("bestScore");

/* ================= 状態 ================= */

let state=
JSON.parse(localStorage.getItem(KEY))||{
  daily:0,
  monthly:0,
  total:0,
  start:0,
  fixedStart:0,
  running:false,
  per:60,
  done:false
};

let stage=
JSON.parse(localStorage.getItem(STAGE))||{};

let quizScore=
JSON.parse(localStorage.getItem(QUIZ))||{
  best:0
};

bestScore.textContent=quizScore.best;

/* ================= 保存 ================= */

function save(){
  localStorage.setItem(KEY,JSON.stringify(state));
}

function saveStage(){
  localStorage.setItem(STAGE,JSON.stringify(stage));
}

function saveQuiz(){
  localStorage.setItem(QUIZ,JSON.stringify(quizScore));
}

/* ================= JST ================= */

function nowJST(){

  return new Date().toLocaleString(
    "ja-JP",
    {
      timeZone:"Asia/Tokyo"
    }
  );
}

/* ================= 時計 ================= */

function updateClock(){

  clock.textContent=nowJST();

  ui();
}

setInterval(updateClock,1000);

updateClock();

/* ================= カウント ================= */

function get(){

  if(!state.running){
    return state;
  }

  let sec=
  (Date.now()-state.start)/1000;

  let add=
  sec*(state.per/60);

  return{
    daily:state.daily+add,
    monthly:state.monthly+add,
    total:state.total+add
  };
}

/* ================= UI ================= */

function ui(){

  let c=get();

  daily.textContent=Math.floor(c.daily);
  monthly.textContent=Math.floor(c.monthly);
  total.textContent=Math.floor(c.total);

  if(state.fixedStart){

    startTime.textContent=
    new Date(state.fixedStart)
    .toLocaleString(
      "ja-JP",
      {
        timeZone:"Asia/Tokyo"
      }
    );

  }else{

    startTime.textContent="未開始";
  }

  btn.textContent=
  state.running
  ? "⏹停止"
  : "▶開始";

  let g=
  Number(goal.value||1);

  let p=
  Math.min(
    100,
    Math.floor((c.daily/g)*100)
  );

  percent.textContent=p;

  fill.style.width=p+"%";

  checkDaily(c);
  checkStage(c.total);

  save();
}

/* ================= 開始停止 ================= */

function toggle(){

  state.per=
  Number(per.value||60);

  if(!state.running){

    const now=Date.now();

    state.running=true;

    state.start=now;

    if(!state.fixedStart){
      state.fixedStart=now;
    }

  }else{

    let c=get();

    state.daily=c.daily;
    state.monthly=c.monthly;
    state.total=c.total;

    state.running=false;
  }

  save();

  ui();
}

/* ================= リセット ================= */

function resetDay(){

  state.daily=0;
  state.done=false;

  save();

  ui();
}

function resetMonth(){

  state.monthly=0;

  save();

  ui();
}

function resetTotal(){

  state.total=0;

  stage={};

  save();
  saveStage();

  ui();
}

/* ================= 段階演出 ================= */

function add(text){

  let d=document.createElement("div");

  d.className="ach";

  d.innerHTML=`
    ${nowJST()}<br><br>
    ${text}
  `;

  ach.prepend(d);
}

function screenFX(){

  document.body.classList.add(
    "flash",
    "shake"
  );

  setTimeout(()=>{
    document.body.classList.remove("shake");
  },2000);

  setTimeout(()=>{
    document.body.classList.remove("flash");
  },5000);
}

/* ================= 宇宙モード ================= */

function createSpace(){

  space.style.display="block";

  space.innerHTML="";

  for(let i=0;i<150;i++){

    let s=document.createElement("div");

    s.className="star";

    s.style.left=
      Math.random()*100+"%";

    s.style.top=
      Math.random()*100+"%";

    s.style.animationDuration=
      (2+Math.random()*3)+"s";

    space.appendChild(s);
  }

  document.body.classList.add("flash");

  setTimeout(()=>{
    endSpace();
  },8000);
}

function endSpace(){

  space.style.display="none";

  document.body.classList.remove("flash");
}

/* ================= 段階チェック ================= */

function checkStage(totalValue){

  if(totalValue>=10000 && !stage[10000]){

    stage[10000]=true;

    add(`
      🥁 大地：スタートライン突破！<br>
      「その積み重ね、最高だぜ！」
    `);

    screenFX();

    saveStage();
  }

  if(totalValue>=50000 && !stage[50000]){

    stage[50000]=true;

    add(`
      🎀 葵：すごい勢いだね！<br>
      「このまま一緒に進もっ✨」
    `);

    screenFX();

    saveStage();
  }

  if(totalValue>=100000 && !stage[100000]){

    stage[100000]=true;

    add(`
      🎸 蓮：努力が形になってきた！<br>
      「かなり強くなってるよ」
    `);

    screenFX();

    saveStage();
  }

  if(totalValue>=200000 && !stage[200000]){

    stage[200000]=true;

    add(`
      🎤 結衣：ここまで本当にすごい！<br>
      「想い、ちゃんと届いてるよ✨」
    `);

    screenFX();

    saveStage();
  }

  if(totalValue>=500000 && !stage[500000]){

    stage[500000]=true;

    add(`
      🎹 悠真：半分到達！<br>
      「積み上げた時間は絶対に力になる」
    `);

    screenFX();

    saveStage();
  }

  if(totalValue>=700000 && !stage[700000]){

    stage[700000]=true;

    add(`
      ✨ 美琴：あと少し…！<br>
      「光が見えてきたね🌌」
    `);

    screenFX();

    saveStage();
  }

  if(totalValue>=1000000 && !stage[1000000]){

    stage[1000000]=true;

    add(`
      🏆 100万達成！！<br>
      🌌 宇宙モード起動！！
    `);

    screenFX();

    createSpace();

    setTimeout(()=>{

      add(`
        🚀 DayDreamプラス覚醒完了<br>
        「新しい世界へようこそ」
      `);

    },3000);

    saveStage();
  }
}

/* ================= 1日達成 ================= */

function checkDaily(c){

  let g=
    Number(goal.value||1);

  if(state.done) return;

  if(c.daily>=g){

    state.done=true;

    save();

    add(`
      🌅 1日の目標達成！<br>
      おめでとう！！
    `);

    screenFX();
  }
}

/* ================= ページ切替 ================= */

function hideAll(){

  document.getElementById("main").style.display="none";
  document.getElementById("prayerPage").style.display="none";
  document.getElementById("quizPage").style.display="none";
}

function backHome(){

  hideAll();

  document.getElementById("main").style.display="block";
}

function openPrayer(){

  hideAll();

  document.getElementById("prayerPage").style.display="block";

  renderPrayer();
}

function openQuiz(){

  hideAll();

  document.getElementById("quizPage").style.display="block";

  generateQuiz();
}

/* ================= 御祈念 ================= */

function savePrayer(){

  if(!prayer.value.trim()) return;

  let list=
  JSON.parse(
    localStorage.getItem(PRAY)||"[]"
  );

  list.unshift({
    text:prayer.value,
    date:nowJST(),
    ok:false
  });

  localStorage.setItem(
    PRAY,
    JSON.stringify(list)
  );

  prayer.value="";

  renderPrayer();
}

function renderPrayer(){

  let list=
  JSON.parse(
    localStorage.getItem(PRAY)||"[]"
  );

  prayerList.innerHTML="";

  list.forEach((x,i)=>{

    let d=
    document.createElement("div");

    d.className="ach";

    d.innerHTML=`

      ${x.date}<br>
      🙏 ${x.text}<br><br>

      <button onclick="toggleOk(${i})">
        ${x.ok?"⭕達成":"⭕未達成"}
      </button>

      <button onclick="delPrayer(${i})">
        削除
      </button>

    `;

    prayerList.appendChild(d);

  });
}

function toggleOk(i){

  let list=
  JSON.parse(
    localStorage.getItem(PRAY)||"[]"
  );

  list[i].ok=!list[i].ok;

  localStorage.setItem(
    PRAY,
    JSON.stringify(list)
  );

  renderPrayer();
}

function delPrayer(i){

  let list=
  JSON.parse(
    localStorage.getItem(PRAY)||"[]"
  );

  list.splice(i,1);

  localStorage.setItem(
    PRAY,
    JSON.stringify(list)
  );

  renderPrayer();
}

/* ================= クイズ ================= */

let quizData=[];
let quizSelections=[];
let quizAnswered=false;

function shuffle(arr){

  return [...arr].sort(
    ()=>Math.random()-0.5
  );
}

function decodeHTML(str){

  const txt=
  document.createElement("textarea");

  txt.innerHTML=str;

  return txt.value;
}

async function translateText(text){

  try{

    const url=
      `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|ja`;

    const res=
      await fetch(url);

    const data=
      await res.json();

    if(
      data &&
      data.responseData &&
      data.responseData.translatedText
    ){
      return data.responseData.translatedText;
    }

    return text;

  }catch(e){

    return text;
  }
}

/* ================= クイズ生成 ================= */

async function generateQuiz(){

  quizList.innerHTML=`
    <div class="ach">
      🌐 インターネットから問題取得中...
    </div>
  `;

  quizResult.innerHTML="";

  quizAnswered=false;

  try{

    const randomSeed=
      Math.random();

    const res=
      await fetch(
        `https://opentdb.com/api.php?amount=5&type=multiple&encode=url3986&t=${randomSeed}`
      );

    const data=
      await res.json();

    quizData=[];

    for(const item of data.results){

      const qOriginal=
        decodeHTML(
          decodeURIComponent(item.question)
        );

      const aOriginal=
        decodeHTML(
          decodeURIComponent(item.correct_answer)
        );

      const incorrectOriginal=
        item.incorrect_answers.map(x=>
          decodeHTML(
            decodeURIComponent(x)
          )
        );

      const qJa=
        await translateText(qOriginal);

      const aJa=
        await translateText(aOriginal);

      let incorrectJa=[];

      for(const txt of incorrectOriginal){

        incorrectJa.push(
          await translateText(txt)
        );
      }

      const choiceObjects=
        shuffle([

          {
            en:aOriginal,
            ja:aJa,
            correct:true
          },

          ...incorrectOriginal.map((x,i)=>({
            en:x,
            ja:incorrectJa[i],
            correct:false
          }))

        ]);

      quizData.push({

        q:qJa,
        qOriginal:qOriginal,
        a:aJa,

        choices:
          choiceObjects.map(x=>x.ja),

        correctIndex:
          choiceObjects.findIndex(x=>x.correct),

        category:
          await translateText(item.category),

        difficulty:
          await translateText(item.difficulty)

      });

    }

    quizSelections=
      [null,null,null,null,null];

    renderQuiz();

  }catch(e){

    quizList.innerHTML=`
      <div class="ach">
        ⚠️ ネット取得失敗
      </div>
    `;
  }
}

/* ================= クイズ描画 ================= */

function renderQuiz(){

  quizList.innerHTML="";

  quizData.forEach((q,i)=>{

    let div=
      document.createElement("div");

    div.className="quizItem";

    div.innerHTML=`

      <div class="quizQuestion">
        Q${i+1}. ${q.q}
      </div>

      <div style="
        font-size:12px;
        color:#666;
        margin-bottom:8px;
      ">
        🌍 ${q.category}
        /
        ⭐ ${q.difficulty}
      </div>

      ${q.choices.map((c,idx)=>`

        <button
          class="choiceBtn"
          onclick="selectChoice(${i},${idx})">

          ${idx+1}. ${c}

        </button>

      `).join("")}

      <div class="original">
        原文: ${q.qOriginal}
      </div>

    `;

    quizList.appendChild(div);

  });
}

/* ================= 選択 ================= */

function selectChoice(qi,ci){

  if(quizAnswered) return;

  quizSelections[qi]=ci;

  renderQuiz();

  const items=
    document.querySelectorAll(".quizItem");

  const item=
    items[qi];

  if(item){

    const btns=
      item.querySelectorAll(".choiceBtn");

    btns.forEach(btn=>{
      btn.style.border=
        "2px solid transparent";
    });

    btns[ci].style.border=
      "2px solid #00acc1";
  }
}

/* ================= 答え合わせ ================= */

function submitQuiz(){

  if(quizAnswered) return;

  quizAnswered=true;

  let score=0;

  let html="";

  const items=
    document.querySelectorAll(".quizItem");

  quizData.forEach((q,i)=>{

    const idx=
      quizSelections[i];

    const buttons=
      items[i]
      .querySelectorAll(".choiceBtn");

    buttons.forEach((btn,bIndex)=>{

      if(bIndex===q.correctIndex){
        btn.classList.add("correct");
      }

      if(
        bIndex===idx &&
        bIndex!==q.correctIndex
      ){
        btn.classList.add("wrong");
      }

    });

    if(idx===q.correctIndex){

      score++;

      html+=`
        <div class="ach">
          ✅ Q${i+1} 正解
        </div>
      `;

    }else{

      html+=`
        <div class="ach">
          ❌ Q${i+1}<br>
          正解: ${q.a}
        </div>
      `;
    }

  });

  if(score>quizScore.best){

    quizScore.best=score;

    saveQuiz();

    bestScore.textContent=
      quizScore.best;
  }

  quizResult.innerHTML=`

    <div class="quizResult">

      🧠 結果 ${score}/5

      <br><br>

      ${
        score===5
        ?"🌟全問正解！"
        :score>=3
        ?"✨いい感じ！"
        :"💡もう一回挑戦！"
      }

    </div>

    ${html}

  `;

  screenFX();
}

/* ================= 初期 ================= */

ui();

</script>

</body>
</html>
