<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>題目カウンター DayDreamプラス DX+ 完全版</title>

<style>

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffb6f9,#b5d7ff,#ffe59e);
  min-height:100vh;
}

.header{
  position:sticky;
  top:0;
  padding:14px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  background:rgba(255,255,255,0.4);
  backdrop-filter:blur(8px);
  z-index:999;
}

.card{
  background:white;
  margin:12px;
  padding:14px;
  border-radius:16px;
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

button{
  border:none;
  border-radius:12px;
  padding:12px;
  margin:4px;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
}

.startBtn{
  background:#00c853;
  color:white;
}

.resetBtn{
  background:#ff7043;
  color:white;
}

.navBtn{
  background:#7c4dff;
  color:white;
}

.quizBtn{
  background:#00acc1;
  color:white;
}

input,textarea{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

.bar{
  height:18px;
  background:#ddd;
  border-radius:999px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00e676,#00b0ff,#ff00aa);
}

.ach{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:#fff3cd;
  line-height:1.8;
}

.space{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  overflow:hidden;
  z-index:9999;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  animation:move 3s linear infinite;
}

@keyframes move{
  from{
    transform:translateY(0);
    opacity:1;
  }
  to{
    transform:translateY(800px);
    opacity:0;
  }
}

.flash{
  animation:flash 0.6s infinite;
}

@keyframes flash{
  0%{filter:brightness(1);}
  50%{filter:brightness(1.8);}
  100%{filter:brightness(1);}
}

.shake{
  animation:shake 0.3s infinite;
}

@keyframes shake{
  0%{transform:translate(0,0);}
  25%{transform:translate(2px,1px);}
  50%{transform:translate(-2px,-1px);}
  75%{transform:translate(1px,-2px);}
  100%{transform:translate(0,0);}
}

/* ================= クイズDX+ ================= */

#quizPage{
  display:none;
  min-height:100vh;
  background:
  linear-gradient(135deg,#0f172a,#1e3a8a,#7c3aed);
  color:white;
  padding:20px 0 40px;
  box-sizing:border-box;
}

.quizDxContainer{
  padding:20px;
  max-width:800px;
  margin:auto;
}

.quizDxTitle{
  text-align:center;
  font-size:38px;
  font-weight:bold;
  margin-top:20px;
  text-shadow:0 0 20px #fff;
}

.quizDxSub{
  text-align:center;
  margin-bottom:25px;
  opacity:0.9;
}

.quizDxCard{
  background:rgba(255,255,255,0.1);
  border-radius:25px;
  padding:25px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 20px rgba(255,255,255,0.2);
  margin-bottom:20px;
}

#category{
  width:100%;
  padding:15px;
  border:none;
  border-radius:15px;
  font-size:18px;
  margin-bottom:20px;
}

.quizDxQuestion{
  font-size:28px;
  margin-bottom:25px;
  line-height:1.5;
}

.choice{
  width:100%;
  padding:18px;
  margin-bottom:15px;
  border:none;
  border-radius:18px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
  background:white;
  color:#222;
  font-weight:bold;
}

.choice:hover{
  transform:scale(1.03);
}

.choice.correct{
  background:#22c55e !important;
  color:white;
}

.choice.wrong{
  background:#ef4444 !important;
  color:white;
}

.quizDxResult{
  text-align:center;
  font-size:30px;
  margin-top:20px;
  font-weight:bold;
}

.quizDxInfo{
  text-align:center;
  margin-top:15px;
  font-size:18px;
}

.quizDxNextBtn{
  padding:15px 25px;
  border:none;
  border-radius:18px;
  font-size:18px;
  cursor:pointer;
  background:#facc15;
  color:#222;
  font-weight:bold;
  margin-top:15px;
}

.quizDxBackBtn{
  padding:15px 25px;
  border:none;
  border-radius:18px;
  font-size:18px;
  cursor:pointer;
  background:#ffffff;
  color:#222;
  font-weight:bold;
  margin-top:15px;
  margin-left:10px;
}

.quizDxScoreBox{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

.quizDxScoreItem{
  flex:1;
  min-width:120px;
  background:rgba(255,255,255,0.12);
  padding:15px;
  border-radius:18px;
  text-align:center;
}

.quizDxEffect{
  animation:quizDxFlash 0.5s;
}

@keyframes quizDxFlash{
  0%{
    transform:scale(1);
  }
  50%{
    transform:scale(1.03);
  }
  100%{
    transform:scale(1);
  }
}

.quizDxFooter{
  text-align:center;
  opacity:0.8;
  margin-top:30px;
  padding-bottom:40px;
}

</style>
</head>

<body>

<div id="space" class="space"></div>

<div class="header">
🌈 題目カウンター DayDreamプラス DX+ 完全版
</div>

<div id="main">

  <div class="card">
    ⏰ <span id="clock"></span><br>
    🚀 開始時刻: <span id="startTime">未開始</span><br>
    📅 日: <span id="daily">0</span><br>
    🗓️ 月: <span id="monthly">0</span><br>
    🏆 総: <span id="total">0</span><br>
    🧠 クイズ最高連続: <span id="bestScore">0</span>
  </div>

  <div class="card">
    <button class="startBtn" onclick="toggle()" id="btn">▶開始</button>
    <button class="resetBtn" onclick="resetDay()">日リセット</button>
    <button class="resetBtn" onclick="resetMonth()">月リセット</button>
    <button class="resetBtn" onclick="resetTotal()">総リセット</button>
    <button class="navBtn" onclick="openPrayer()">🙏 御祈念</button>
    <button class="quizBtn" onclick="openQuiz()">🧠 クイズ</button>
  </div>

  <div class="card">
    1分あたり
    <input id="per" type="number" value="60">

    1日の目標
    <input id="goal" type="number" value="3000">

    達成率 <span id="percent">0</span>%

    <div class="bar">
      <div class="fill" id="fill"></div>
    </div>
  </div>

  <div class="card">
    <h3>🌈 段階演出</h3>
    <div id="ach"></div>
  </div>

</div>

<!-- 御祈念 -->
<div id="prayerPage" style="display:none">
  <div class="card">
    <h3>🙏 御祈念</h3>

    <textarea id="prayer"></textarea>

    <button class="startBtn" onclick="savePrayer()">
      保存
    </button>

    <button class="navBtn" onclick="backHome()">
      戻る
    </button>

    <div id="prayerList"></div>
  </div>
</div>

<!-- クイズ -->
<div id="quizPage" style="display:none">

  <div class="quizDxContainer">

    <div class="quizDxTitle">
      🌍 世界クイズDX+
    </div>

    <div class="quizDxSub">
      DayDreamプラス クイズモード
    </div>

    <div class="quizDxCard" id="quizDxCard">

      <div class="quizDxScoreBox">

        <div class="quizDxScoreItem">
          <div>🏆 スコア</div>
          <div id="score">0</div>
        </div>

        <div class="quizDxScoreItem">
          <div>🔥 連続正解</div>
          <div id="combo">0</div>
        </div>

        <div class="quizDxScoreItem">
          <div>🎮 問題数</div>
          <div id="count">0</div>
        </div>

      </div>

      <select id="category">
        <option value="">🌈 ランダム</option>
        <option value="9">🧠 一般常識</option>
        <option value="17">🔬 科学</option>
        <option value="21">⚽ スポーツ</option>
        <option value="23">🏛 歴史</option>
        <option value="22">🌍 地理</option>
        <option value="11">🎬 映画</option>
        <option value="12">🎵 音楽</option>
        <option value="31">🎌 アニメ</option>
      </select>

      <div class="quizDxQuestion" id="question">
        クイズ読み込み中...
      </div>

      <div id="choices"></div>

      <div class="quizDxResult" id="result"></div>

      <div class="quizDxInfo" id="info"></div>

      <center>
        <button class="quizDxNextBtn" onclick="loadQuiz()">
          ▶ 次の問題
        </button>

        <button class="quizDxBackBtn" onclick="backHome()">
          戻る
        </button>
      </center>

    </div>

    <div class="quizDxFooter">
      🌌 世界 & 日本クイズ対応
    </div>

  </div>

</div>

<script>

/* ================= 保存キー ================= */

const KEY="ddd_counter_final";
const PRAY="ddd_prayer_final";
const STAGE="ddd_stage_final";

/* ================= DOM ================= */

const daily=document.getElementById("daily");
const monthly=document.getElementById("monthly");
const total=document.getElementById("total");
const clock=document.getElementById("clock");
const btn=document.getElementById("btn");
const startTime=document.getElementById("startTime");
const fill=document.getElementById("fill");
const percent=document.getElementById("percent");
const goal=document.getElementById("goal");
const per=document.getElementById("per");
const ach=document.getElementById("ach");
const space=document.getElementById("space");

const prayer=document.getElementById("prayer");
const prayerList=document.getElementById("prayerList");

const bestScore=document.getElementById("bestScore");

/* ================= 状態 ================= */

let state=
JSON.parse(localStorage.getItem(KEY))||{
  daily:0,
  monthly:0,
  total:0,
  start:0,
  fixedStart:0,
  running:false,
  per:60,
  done:false
};

let stage=
JSON.parse(localStorage.getItem(STAGE))||{};

let quizBest=
Number(localStorage.getItem("quizBest")) || 0;

bestScore.textContent=quizBest;

/* ================= 保存 ================= */

function save(){
  localStorage.setItem(KEY,JSON.stringify(state));
}

function saveStage(){
  localStorage.setItem(STAGE,JSON.stringify(stage));
}

/* ================= JST ================= */

function nowJST(){
  return new Date().toLocaleString(
    "ja-JP",
    {
      timeZone:"Asia/Tokyo"
    }
  );
}

/* ================= 時計 ================= */

function updateClock(){
  clock.textContent=nowJST();
  ui();
}

setInterval(updateClock,1000);
updateClock();

/* ================= カウント ================= */

function get(){

  if(!state.running){
    return state;
  }

  let sec=
  (Date.now()-state.start)/1000;

  let add=
  sec*(state.per/60);

  return{
    daily:state.daily+add,
    monthly:state.monthly+add,
    total:state.total+add
  };
}

/* ================= UI ================= */

function ui(){

  let c=get();

  daily.textContent=Math.floor(c.daily);
  monthly.textContent=Math.floor(c.monthly);
  total.textContent=Math.floor(c.total);

  if(state.fixedStart){

    startTime.textContent=
    new Date(state.fixedStart)
    .toLocaleString(
      "ja-JP",
      {
        timeZone:"Asia/Tokyo"
      }
    );

  }else{

    startTime.textContent="未開始";
  }

  btn.textContent=
  state.running
  ? "⏹停止"
  : "▶開始";

  let g=
  Number(goal.value||1);

  let p=
  Math.min(
    100,
    Math.floor((c.daily/g)*100)
  );

  percent.textContent=p;
  fill.style.width=p+"%";

  bestScore.textContent=quizBest;

  checkDaily(c);
  checkStage(c.total);

  save();
}

/* ================= 開始停止 ================= */

function toggle(){

  state.per=
  Number(per.value||60);

  if(!state.running){

    const now=Date.now();

    state.running=true;
    state.start=now;

    /* 開始するたびに開始時刻を更新 */
    state.fixedStart=now;

  }else{

    let c=get();

    state.daily=c.daily;
    state.monthly=c.monthly;
    state.total=c.total;

    state.running=false;
  }

  save();
  ui();
}

/* ================= リセット ================= */

function resetDay(){

  state.daily=0;
  state.done=false;

  /* 日リセット時に開始時刻も未開始へ戻す */
  state.start=0;
  state.fixedStart=0;
  state.running=false;

  save();
  ui();
}

function resetMonth(){
  state.monthly=0;
  save();
  ui();
}

function resetTotal(){
  state.total=0;
  stage={};
  save();
  saveStage();
  ui();
}

/* ================= 段階演出 ================= */

function add(text){

  let d=document.createElement("div");

  d.className="ach";

  d.innerHTML=`
    ${nowJST()}<br><br>
    ${text}
  `;

  ach.prepend(d);
}

function screenFX(){

  document.body.classList.add(
    "flash",
    "shake"
  );

  setTimeout(()=>{
    document.body.classList.remove("shake");
  },2000);

  setTimeout(()=>{
    document.body.classList.remove("flash");
  },5000);
}

/* ================= 宇宙モード ================= */

function createSpace(){

  space.style.display="block";
  space.innerHTML="";

  for(let i=0;i<150;i++){

    let s=document.createElement("div");

    s.className="star";
    s.style.left=Math.random()*100+"%";
    s.style.top=Math.random()*100+"%";
    s.style.animationDuration=(2+Math.random()*3)+"s";

    space.appendChild(s);
  }

  document.body.classList.add("flash");

  setTimeout(()=>{
    endSpace();
  },8000);
}

function endSpace(){
  space.style.display="none";
  document.body.classList.remove("flash");
}

/* ================= 段階チェック ================= */

function checkStage(totalValue){

  if(totalValue>=10000 && !stage[10000]){

    stage[10000]=true;

    add(`
      🥁 大地：スタートライン突破！<br>
      「その積み重ね、最高だぜ！」
    `);

    screenFX();
    saveStage();
  }

  if(totalValue>=50000 && !stage[50000]){

    stage[50000]=true;

    add(`
      🎀 葵：すごい勢いだね！<br>
      「このまま一緒に進もっ✨」
    `);

    screenFX();
    saveStage();
  }

  if(totalValue>=100000 && !stage[100000]){

    stage[100000]=true;

    add(`
      🎸 蓮：努力が形になってきた！<br>
      「かなり強くなってるよ」
    `);

    screenFX();
    saveStage();
  }

  if(totalValue>=200000 && !stage[200000]){

    stage[200000]=true;

    add(`
      🎤 結衣：ここまで本当にすごい！<br>
      「想い、ちゃんと届いてるよ✨」
    `);

    screenFX();
    saveStage();
  }

  if(totalValue>=500000 && !stage[500000]){

    stage[500000]=true;

    add(`
      🎹 悠真：半分到達！<br>
      「積み上げた時間は絶対に力になる」
    `);

    screenFX();
    saveStage();
  }

  if(totalValue>=700000 && !stage[700000]){

    stage[700000]=true;

    add(`
      ✨ 美琴：あと少し…！<br>
      「光が見えてきたね🌌」
    `);

    screenFX();
    saveStage();
  }

  if(totalValue>=1000000 && !stage[1000000]){

    stage[1000000]=true;

    add(`
      🏆 100万達成！！<br>
      🌌 宇宙モード起動！！
    `);

    screenFX();
    createSpace();

    setTimeout(()=>{
      add(`
        🚀 DayDreamプラス覚醒完了<br>
        「新しい世界へようこそ」
      `);
    },3000);

    saveStage();
  }
}

/* ================= 1日達成 ================= */

function checkDaily(c){

  let g=
  Number(goal.value||1);

  if(state.done) return;

  if(c.daily>=g){

    state.done=true;

    save();

    add(`
      🌅 1日の目標達成！<br>
      おめでとう！！
    `);

    screenFX();
  }
}

/* ================= ページ切替 ================= */

function hideAll(){
  document.getElementById("main").style.display="none";
  document.getElementById("prayerPage").style.display="none";
  document.getElementById("quizPage").style.display="none";
}

function backHome(){
  hideAll();
  document.getElementById("main").style.display="block";
}

function openPrayer(){
  hideAll();
  document.getElementById("prayerPage").style.display="block";
  renderPrayer();
}

function openQuiz(){
  hideAll();
  document.getElementById("quizPage").style.display="block";
  loadQuiz();
}

/* ================= 御祈念 ================= */

function savePrayer(){

  if(!prayer.value.trim()) return;

  let list=
  JSON.parse(
    localStorage.getItem(PRAY)||"[]"
  );

  list.unshift({
    text:prayer.value,
    date:nowJST(),
    ok:false
  });

  localStorage.setItem(
    PRAY,
    JSON.stringify(list)
  );

  prayer.value="";

  renderPrayer();
}

function renderPrayer(){

  let list=
  JSON.parse(
    localStorage.getItem(PRAY)||"[]"
  );

  prayerList.innerHTML="";

  list.forEach((x,i)=>{

    let d=
    document.createElement("div");

    d.className="ach";

    d.innerHTML=`
      ${x.date}<br>
      🙏 ${x.text}<br><br>

      <button onclick="toggleOk(${i})">
        ${x.ok?"⭕達成":"⭕未達成"}
      </button>

      <button onclick="delPrayer(${i})">
        削除
      </button>
    `;

    prayerList.appendChild(d);

  });
}

function toggleOk(i){

  let list=
  JSON.parse(
    localStorage.getItem(PRAY)||"[]"
  );

  list[i].ok=!list[i].ok;

  localStorage.setItem(
    PRAY,
    JSON.stringify(list)
  );

  renderPrayer();
}

function delPrayer(i){

  let list=
  JSON.parse(
    localStorage.getItem(PRAY)||"[]"
  );

  list.splice(i,1);

  localStorage.setItem(
    PRAY,
    JSON.stringify(list)
  );

  renderPrayer();
}

/* ================= クイズDX+ ================= */

let currentAnswer = "";
let score = Number(localStorage.getItem("quizScore")) || 0;
let combo = Number(localStorage.getItem("quizCombo")) || 0;
let count = Number(localStorage.getItem("quizCount")) || 0;

const japanQuiz = [

{
question:"日本で一番高い山は？",
choices:["富士山","高尾山","阿蘇山","筑波山"],
answer:"富士山"
},

{
question:"ドラえもんの好物は？",
choices:["どら焼き","たい焼き","ケーキ","団子"],
answer:"どら焼き"
},

{
question:"日本の首都は？",
choices:["大阪","東京","名古屋","札幌"],
answer:"東京"
},

{
question:"日本の国花は？",
choices:["バラ","桜","ひまわり","梅"],
answer:"桜"
},

{
question:"北海道の県庁所在地は？",
choices:["札幌","函館","旭川","小樽"],
answer:"札幌"
},

{
question:"日本で一番長い川は？",
choices:["信濃川","利根川","天竜川","石狩川"],
answer:"信濃川"
}

];

function shuffle(array){

  for(let i=array.length-1;i>0;i--){

    const j=Math.floor(Math.random()*(i+1));

    [array[i],array[j]]=[array[j],array[i]];
  }

  return array;
}

function decodeHTML(html){

  const txt=document.createElement("textarea");
  txt.innerHTML=html;
  return txt.value;
}

function updateQuizUI(){

  const scoreEl=document.getElementById("score");
  const comboEl=document.getElementById("combo");
  const countEl=document.getElementById("count");

  if(scoreEl) scoreEl.innerText=score;
  if(comboEl) comboEl.innerText=combo;
  if(countEl) countEl.innerText=count;

  bestScore.textContent=quizBest;
}

function saveQuizData(){

  localStorage.setItem("quizScore",score);
  localStorage.setItem("quizCombo",combo);
  localStorage.setItem("quizCount",count);
  localStorage.setItem("quizBest",quizBest);
}

async function loadQuiz(){

  const questionEl=document.getElementById("question");
  const resultEl=document.getElementById("result");
  const infoEl=document.getElementById("info");
  const categoryEl=document.getElementById("category");

  if(resultEl) resultEl.innerText="";
  if(infoEl) infoEl.innerText="";
  if(questionEl) questionEl.innerHTML="クイズ読み込み中...";

  const category =
  categoryEl ? categoryEl.value : "";

  try{

    let quiz;

    if(Math.random() < 0.5){

      quiz = japanQuiz[
        Math.floor(Math.random()*japanQuiz.length)
      ];

      showJapanQuiz(quiz);

    }else{

      const url = category
        ? `https://opentdb.com/api.php?amount=1&type=multiple&category=${category}`
        : `https://opentdb.com/api.php?amount=1&type=multiple`;

      const res = await fetch(url);
      const data = await res.json();

      if(!data || !data.results || !data.results[0]){
        throw new Error("quiz data empty");
      }

      const q = data.results[0];

      const choices = [
        ...q.incorrect_answers,
        q.correct_answer
      ];

      shuffle(choices);

      quiz = {
        question:q.question,
        choices:choices,
        answer:q.correct_answer
      };

      showWorldQuiz(quiz);
    }

  }catch(e){

    if(questionEl){
      questionEl.innerHTML="⚠ クイズ取得失敗";
    }

    console.log(e);
  }
}

function showWorldQuiz(quiz){

  const questionEl=document.getElementById("question");

  if(questionEl){
    questionEl.innerHTML=
    "🌍 "+decodeHTML(quiz.question);
  }

  createChoices(
    quiz.choices.map(c=>decodeHTML(c)),
    decodeHTML(quiz.answer)
  );
}

function showJapanQuiz(quiz){

  const questionEl=document.getElementById("question");

  if(questionEl){
    questionEl.innerHTML=
    "🇯🇵 "+quiz.question;
  }

  createChoices(
    quiz.choices,
    quiz.answer
  );
}

function createChoices(choices,answer){

  currentAnswer=answer;

  const choicesDiv=
  document.getElementById("choices");

  if(!choicesDiv) return;

  choicesDiv.innerHTML="";

  choices.forEach(choice=>{

    const btn=document.createElement("button");

    btn.className="choice";
    btn.innerText=choice;
    btn.onclick=()=>checkAnswer(btn,choice);

    choicesDiv.appendChild(btn);

  });
}

function checkAnswer(button,choice){

  const buttons=
  document.querySelectorAll(".choice");

  const resultEl=document.getElementById("result");
  const infoEl=document.getElementById("info");
  const quizDxCard=document.getElementById("quizDxCard");

  buttons.forEach(btn=>{
    btn.disabled=true;
  });

  count++;

  if(choice===currentAnswer){

    button.classList.add("correct");

    score+=10;
    combo++;

    if(combo>quizBest){
      quizBest=combo;
    }

    if(resultEl){
      resultEl.innerText="🎉 正解！！";
    }

    if(combo>=5){

      if(quizDxCard){
        quizDxCard.classList.add("quizDxEffect");

        setTimeout(()=>{
          quizDxCard.classList.remove("quizDxEffect");
        },500);
      }

      if(infoEl){
        infoEl.innerText="🌟 コンボボーナス！";
      }

    }else{

      if(infoEl){
        infoEl.innerText="";
      }
    }

  }else{

    button.classList.add("wrong");

    combo=0;

    if(resultEl){
      resultEl.innerText="❌ 不正解";
    }

    if(infoEl){
      infoEl.innerText="正解: "+currentAnswer;
    }

    buttons.forEach(btn=>{

      if(btn.innerText===currentAnswer){
        btn.classList.add("correct");
      }

    });
  }

  saveQuizData();
  updateQuizUI();
}

/* 旧互換 */
function generateQuiz(){
  loadQuiz();
}

/* ================= 初期 ================= */

updateQuizUI();
ui();
