<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>題目カウンター DayDreamプラス DX+</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffb6f9,#b5d7ff,#ffe59e);
}

/* 🌌宇宙モード */
.space{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  overflow:hidden;
  display:none;
  z-index:9999;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  animation:move 3s linear infinite;
}

@keyframes move{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(800px);opacity:0;}
}

.flash{
  animation:flash 0.8s infinite;
}

@keyframes flash{
  0%{filter:brightness(1);}
  50%{filter:brightness(2);}
  100%{filter:brightness(1);}
}

/* UI */
.header{
  position:sticky;
  top:0;
  padding:12px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
}

.card{
  background:white;
  margin:12px;
  padding:14px;
  border-radius:14px;
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

button{
  padding:10px;
  margin:4px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.startBtn{background:#00c853;color:white;}
.resetBtn{background:#ff7043;color:white;}
.navBtn{background:#7c4dff;color:white;}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  box-sizing:border-box;
}

.bar{
  height:18px;
  background:#ddd;
  border-radius:999px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00e676,#00b0ff,#ff00aa);
}

.ach{
  margin-top:8px;
  padding:10px;
  background:#fff3cd;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- 🌌宇宙 -->
<div id="space" class="space"></div>

<div class="header">
🌈 題目カウンター DayDreamプラス DX+
</div>

<div id="main">

<div class="card">
⏰ <span id="clock"></span><br>
🚀 開始: <span id="startTime">未開始</span><br>
📅 日: <span id="daily">0</span><br>
🗓️ 月: <span id="monthly">0</span><br>
🏆 総: <span id="total">0</span>
</div>

<div class="card">

<button class="startBtn" onclick="toggle()" id="btn">▶開始</button>
<button class="resetBtn" onclick="resetDay()">日リセット</button>
<button class="resetBtn" onclick="resetMonth()">月リセット</button>
<button class="resetBtn" onclick="resetTotal()">総リセット</button>
<button class="navBtn" onclick="openPrayer()">御祈念</button>

</div>

<div class="card">

1分あたり
<input id="per" type="number" value="60">

目標
<input id="goal" type="number" value="3000">

達成率 <span id="percent">0</span>%

<div class="bar"><div class="fill" id="fill"></div></div>

</div>

<div class="card">
<h3>🌈 段階演出</h3>
<div id="ach"></div>
</div>

</div>

<!-- 🌸御祈念 -->
<div id="prayerPage" style="display:none">

<div class="card">
<h3>🙏御祈念</h3>

<textarea id="prayer" maxlength="300"></textarea>

<button class="startBtn" onclick="savePrayer()">保存</button>
<button class="navBtn" onclick="back()">戻る</button>

<div id="prayerList"></div>
</div>

</div>

<script>

/* ================= DATA ================= */
const KEY="dx_all_final";
const PRAY="dx_pray_final";

let state=JSON.parse(localStorage.getItem(KEY))||{
  daily:0,
  monthly:0,
  total:0,
  start:0,
  fixedStart:0,
  running:false,
  per:60,
  done:false
};

function save(){
  localStorage.setItem(KEY,JSON.stringify(state));
}

/* ================= COUNT ================= */
function get(){
  if(!state.running)return state;

  let sec=(Date.now()-state.start)/1000;
  let add=sec*(state.per/60);

  return{
    daily:state.daily+add,
    monthly:state.monthly+add,
    total:state.total+add
  };
}

/* ================= UI ================= */
function ui(){

  let c=get();

  daily.textContent=Math.floor(c.daily);
  monthly.textContent=Math.floor(c.monthly);
  total.textContent=Math.floor(c.total);

  startTime.textContent=
    state.fixedStart ? new Date(state.fixedStart).toLocaleString() : "未開始";

  let g=goal.value||1;
  let p=Math.min(100,Math.floor(c.daily/g*100));

  percent.textContent=p;
  fill.style.width=p+"%";

  checkDaily(c);
  checkStage(c.total);

  save();
}

/* ================= CLOCK ================= */
setInterval(()=>{
  clock.textContent=new Date().toLocaleString();
  ui();
},1000);

/* ================= START ================= */
function toggle(){

  state.per=Number(per.value||60);

  if(!state.running){
    state.running=true;
    state.start=Date.now();
    state.fixedStart=state.fixedStart||Date.now();
    btn.textContent="停止";
  }else{
    let c=get();
    state.daily=c.daily;
    state.monthly=c.monthly;
    state.total=c.total;
    state.running=false;
    btn.textContent="開始";
  }

  save();
}

/* ================= RESET ================= */
function resetDay(){state.daily=0;state.done=false;save();}
function resetMonth(){state.monthly=0;save();}
function resetTotal(){state.total=0;save();}

/* ================= 1日達成 ================= */
function checkDaily(c){

  let g=Number(goal.value||1);

  if(state.done) return;

  if(c.daily>=g){
    state.done=true;
    save();
    add("🌅 1日達成おめでとう！");
  }
}

/* ================= 段階演出 ================= */
let fired={};

function fire(id,fn){
  if(fired[id]) return;
  fired[id]=true;
  fn();
}

/* 🌌宇宙モード */
function createSpace(){

  space.style.display="block";
  space.innerHTML="";
  document.body.classList.add("flash");

  for(let i=0;i<100;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"%";
    s.style.top=Math.random()*100+"%";
    s.style.animationDuration=(Math.random()*3+2)+"s";
    space.appendChild(s);
  }
}

function endSpace(){
  space.style.display="none";
  document.body.classList.remove("flash");
}

function checkStage(t){

  fire("10k",()=>{if(t>=10000)add("🥁 大地：スタート");});
  fire("50k",()=>{if(t>=50000)add("🎀 葵：いい感じ");});
  fire("100k",()=>{if(t>=100000)add("🎸 蓮：積み重ね");});
  fire("200k",()=>{if(t>=200000)add("🎤 結衣：届いてる");});
  fire("500k",()=>{if(t>=500000)add("🎹 悠真：すごい");});

  fire("1m",()=>{
    if(t>=1000000){
      add("🏆 100万達成！！");
      add("🌌 宇宙モード突入！！");

      createSpace();

      setTimeout(()=>{
        add("✨ 覚醒完了");
        endSpace();
      },8000);
    }
  });

}

/* ================= ADD ================= */
function add(text){
  let d=document.createElement("div");
  d.className="ach";
  d.textContent=text;
  ach.prepend(d);
}

/* ================= 御祈念 ================= */
function openPrayer(){
  main.style.display="none";
  prayerPage.style.display="block";
  renderPrayer();
}

function back(){
  main.style.display="block";
  prayerPage.style.display="none";
}

function savePrayer(){

  let list=JSON.parse(localStorage.getItem(PRAY)||"[]");

  list.unshift({
    text:prayer.value,
    date:new Date().toLocaleString(),
    ok:false
  });

  localStorage.setItem(PRAY,JSON.stringify(list));
  prayer.value="";
  renderPrayer();
}

function renderPrayer(){

  let list=JSON.parse(localStorage.getItem(PRAY)||"[]");
  prayerList.innerHTML="";

  list.forEach((x,i)=>{

    let d=document.createElement("div");
    d.className="ach";

    d.innerHTML=`
      ${x.date}<br>
      🙏 ${x.text}<br>

      <button onclick="toggleOk(${i})"
      style="background:${x.ok?'red':'#ccc'};border-radius:50%;width:40px;height:40px;">◎</button>

      <button onclick="del(${i})">削除</button>
    `;

    prayerList.appendChild(d);
  });
}

function toggleOk(i){
  let list=JSON.parse(localStorage.getItem(PRAY)||"[]");
  list[i].ok=!list[i].ok;
  localStorage.setItem(PRAY,JSON.stringify(list));
  renderPrayer();
}

function del(i){
  let list=JSON.parse(localStorage.getItem(PRAY)||"[]");
  list.splice(i,1);
  localStorage.setItem(PRAY,JSON.stringify(list));
  renderPrayer();
}

/* ================= LOOP ================= */
setInterval(()=>ui(),1000);

</script>

</body>
</html>
