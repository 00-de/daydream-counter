<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayDreamプラス DX+ 完全版</title>

<style>
body{
  margin:0;
  padding:20px;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffb6f9,#b5d7ff,#ffe59e);
}

h1{text-align:center;}

.card{
  background:#fff;
  padding:18px;
  border-radius:20px;
  margin-bottom:15px;
  box-shadow:0 6px 14px rgba(0,0,0,.15);
}

button{
  border:none;
  padding:12px 14px;
  border-radius:12px;
  margin:5px;
  font-weight:bold;
  cursor:pointer;
}

.startBtn{background:#00c853;color:#fff;}
.resetBtn{background:#ff7043;color:#fff;}
.navBtn{background:#7c4dff;color:#fff;}
.saveBtn{background:#2979ff;color:#fff;}
.deleteBtn{background:#d50000;color:#fff;}

input,textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  box-sizing:border-box;
}

.bar{
  height:24px;
  background:#ddd;
  border-radius:999px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00e676,#00b0ff,#ff00aa);
}

.hidden{display:none;}

.historyItem{
  padding:10px;
  margin-top:10px;
  background:#f5f5f5;
  border-radius:12px;
}

.achievement{
  margin-top:10px;
  padding:12px;
  background:#fff3cd;
  border-radius:14px;
  font-weight:bold;
  animation:pop .5s ease;
}

@keyframes pop{
  0%{transform:scale(.7);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<h1>🌈 DayDreamプラス DX+</h1>

<!-- MAIN -->
<div id="main">

<div class="card">
<div>⏰ 現在: <span id="clock"></span></div>
<div>🚀 開始: <span id="startTime">未開始</span></div>
<hr>
<div>📅 日: <span id="daily">0</span></div>
<div>🗓️ 月: <span id="monthly">0</span></div>
<div>🏆 総: <span id="total">0</span></div>
</div>

<div class="card">

<button class="startBtn" onclick="toggle()" id="btn">▶ 自動開始</button>

<button class="resetBtn" onclick="resetDay()">📅 日リセット</button>
<button class="resetBtn" onclick="resetMonth()">🗓️ 月リセット</button>
<button class="resetBtn" onclick="resetTotal()">🏆 総リセット</button>

<button class="navBtn" onclick="openPrayer()">🙏御祈念</button>

</div>

<div class="card">

<label>1分数</label>
<input id="perMinute" type="number" value="60">

<label>目標</label>
<input id="goal" type="number" value="3000">

<div>達成: <span id="percent">0</span>%</div>

<div class="bar"><div class="fill" id="fill"></div></div>

</div>

<div class="card">
<h3>🌈 DayDream演出</h3>
<div id="achievement"></div>
</div>

</div>

<!-- PRAYER -->
<div id="prayerPage" class="hidden">

<div class="card">
<h2>🙏御祈念</h2>

<textarea id="text" maxlength="300" rows="5"></textarea>

<button class="saveBtn" onclick="savePrayer()">保存</button>
<button class="deleteBtn" onclick="clearText()">削除</button>
<button class="navBtn" onclick="back()">戻る</button>
</div>

<div class="card">
<h3>📖 御祈念履歴</h3>
<div id="list"></div>
</div>

</div>

<script>

/* ===== STATE ===== */
let state={
  daily:0,
  monthly:0,
  total:0,
  start:0,
  fixedStart:0,
  running:false,
  perMinute:60,
  goalDone:false,
  stage:{
    10000:false,
    50000:false,
    100000:false,
    200000:false,
    500000:false,
    700000:false,
    1000000:false
  }
};

const KEY="dx_prayer";

/* ===== COUNT ===== */
function get(){

  if(!state.running||!state.start)return state;

  let sec=(Date.now()-state.start)/1000;
  let add=sec*(state.perMinute/60);

  return{
    daily:state.daily+add,
    monthly:state.monthly+add,
    total:state.total+add
  };
}

/* ===== UI ===== */
function ui(){

  let c=get();

  document.getElementById("daily").innerText=Math.floor(c.daily);
  document.getElementById("monthly").innerText=Math.floor(c.monthly);
  document.getElementById("total").innerText=Math.floor(c.total);

  document.getElementById("startTime").innerText=
    state.fixedStart
    ? new Date(state.fixedStart).toLocaleString()
    : "未開始";

  let goal=+document.getElementById("goal").value||1;
  let p=Math.min(100,Math.floor(c.daily/goal*100));

  document.getElementById("percent").innerText=p;
  document.getElementById("fill").style.width=p+"%";

  checkGoal(c);
  checkStage(c.total);
}

/* ===== CLOCK ===== */
function clock(){
  document.getElementById("clock").innerText=
    new Date().toLocaleString();
}

/* ===== START ===== */
function toggle(){

  state.perMinute=+document.getElementById("perMinute").value||60;

  if(!state.running){

    state.running=true;
    state.start=Date.now();
    state.fixedStart=Date.now();

    document.getElementById("btn").innerText="⏹停止";

  }else{

    let c=get();

    state.daily=c.daily;
    state.monthly=c.monthly;
    state.total=c.total;

    state.running=false;

    document.getElementById("btn").innerText="▶自動開始";
  }
}

/* ===== 1日演出 ===== */
function checkGoal(c){

  let goal=+document.getElementById("goal").value||1;

  if(c.daily>=goal && !state.goalDone){

    state.goalDone=true;
    add("🌅 1日目標達成！おつかれさま(^^)v");
  }
}

/* ===== 段階演出（完全版） ===== */
function checkStage(t){

  const s=state.stage;

  if(t>=10000&&!s[10000]){s[10000]=true;add("🥁 大地：スタートだね！");}
  if(t>=50000&&!s[50000]){s[50000]=true;add("🎀 葵：すごいペース！");}
  if(t>=100000&&!s[100000]){s[100000]=true;add("🎸 蓮：いい感じ！");}
  if(t>=200000&&!s[200000]){s[200000]=true;add("🎤 結衣：もっと行けるよ！");}
  if(t>=500000&&!s[500000]){s[500000]=true;add("🎹 悠真：本当にすごい");}
  if(t>=700000&&!s[700000]){s[700000]=true;add("🌌 全員：もうすぐ100万！");}
  if(t>=1000000&&!s[1000000]){s[1000000]=true;add("🏆 全員：完全覚醒！！");}
}

/* ===== ADD ===== */
function add(text){

  let d=document.createElement("div");
  d.className="achievement";
  d.innerText=text;

  document.getElementById("achievement").prepend(d);
}

/* ===== RESET ===== */
function resetDay(){state.daily=0;}
function resetMonth(){state.monthly=0;}
function resetTotal(){state.total=0;}

/* ===== PRAYER ===== */
function openPrayer(){
  document.getElementById("main").classList.add("hidden");
  document.getElementById("prayerPage").classList.remove("hidden");
  render();
}

function back(){
  document.getElementById("main").classList.remove("hidden");
  document.getElementById("prayerPage").classList.add("hidden");
}

/* ===== SAVE ===== */
function savePrayer(){

  let t=document.getElementById("text").value.trim();
  if(!t)return;

  let list=JSON.parse(localStorage.getItem(KEY))||[];

  list.unshift({d:new Date().toLocaleString(),t});

  localStorage.setItem(KEY,JSON.stringify(list));
  document.getElementById("text").value="";
  render();
}

/* ===== RENDER ===== */
function render(){

  let list=JSON.parse(localStorage.getItem(KEY))||[];
  let el=document.getElementById("list");

  if(list.length===0){el.innerHTML="なし";return;}

  el.innerHTML="";

  list.forEach(x=>{
    let d=document.createElement("div");
    d.className="historyItem";
    d.innerHTML=`${x.d}<br>🙏 ${x.t}`;
    el.appendChild(d);
  });
}

/* ===== CLEAR ===== */
function clearText(){
  document.getElementById("text").value="";
}

/* ===== LOOP ===== */
setInterval(()=>{
  clock();
  ui();
},1000);

clock();
ui();
render();

</script>

</body>
</html>
