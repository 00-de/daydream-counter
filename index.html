<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>題目カウンター DayDreamプラス DX+</title>

<style>

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffb6f9,#b5d7ff,#ffe59e);
  transition:0.3s;
}

.header{
  position:sticky;
  top:0;
  padding:12px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(6px);
  z-index:10;
}

.card{
  background:#fff;
  margin:12px;
  padding:14px;
  border-radius:14px;
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

button{
  padding:10px 12px;
  margin:4px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  font-size:14px;
}

.startBtn{
  background:#00c853;
  color:white;
}

.resetBtn{
  background:#ff7043;
  color:white;
}

.navBtn{
  background:#7c4dff;
  color:white;
}

.quizBtn{
  background:#00acc1;
  color:white;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  box-sizing:border-box;
  border:1px solid #ccc;
  font-size:16px;
}

.bar{
  height:18px;
  background:#ddd;
  border-radius:999px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00e676,#00b0ff,#ff00aa);
}

.ach{
  margin-top:8px;
  padding:10px;
  background:#fff3cd;
  border-radius:10px;
  line-height:1.6;
}

.space{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  overflow:hidden;
  z-index:9999;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  animation:move 3s linear infinite;
}

@keyframes move{
  from{
    transform:translateY(0);
    opacity:1;
  }
  to{
    transform:translateY(800px);
    opacity:0;
  }
}

.flash{
  animation:flash 0.6s infinite;
}

@keyframes flash{
  0%{filter:brightness(1);}
  50%{filter:brightness(1.8);}
  100%{filter:brightness(1);}
}

.shake{
  animation:shake 0.3s infinite;
}

@keyframes shake{
  0%{transform:translate(0,0);}
  25%{transform:translate(2px,1px);}
  50%{transform:translate(-2px,-1px);}
  75%{transform:translate(1px,-2px);}
  100%{transform:translate(0,0);}
}

.quizItem{
  background:#f7fbff;
  border-radius:12px;
  padding:12px;
  margin-top:10px;
}

.quizQuestion{
  font-weight:bold;
  margin-bottom:8px;
  line-height:1.7;
}

.choiceBtn{
  display:block;
  width:100%;
  text-align:left;
  background:#eef7ff;
  color:#333;
  margin-top:8px;
  border:2px solid transparent;
  border-radius:12px;
  padding:12px;
  font-weight:bold;
}

.choiceBtn.correct{
  background:#c8e6c9;
  border-color:#2e7d32;
}

.choiceBtn.wrong{
  background:#ffcdd2;
  border-color:#c62828;
}

.quizResult{
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  background:#e8f5e9;
  font-weight:bold;
  line-height:1.7;
}

.timeMeta{
  font-size:12px;
  color:#555;
  margin-top:6px;
}

.inlineTime{
  display:inline-block;
  margin-right:10px;
}

</style>
</head>

<body>

<div id="space" class="space"></div>

<div class="header">
🌈 題目カウンター DayDreamプラス DX+
</div>

<div id="main">

<div class="card">
⏰ <span id="clock"></span><br>

🚀 開始:
<span id="startTime">未開始</span><br>

📅 日:
<span id="daily">0</span><br>

🗓️ 月:
<span id="monthly">0</span><br>

🏆 総:
<span id="total">0</span><br>

🧠 クイズ最高点:
<span id="bestScore">0</span>/5
</div>

<div class="card">

<button class="startBtn" onclick="toggle()" id="btn">
▶開始
</button>

<button class="resetBtn" onclick="resetDay()">
日リセット
</button>

<button class="resetBtn" onclick="resetMonth()">
月リセット
</button>

<button class="resetBtn" onclick="resetTotal()">
総リセット
</button>

<button class="navBtn" onclick="openPrayer()">
御祈念
</button>

<button class="quizBtn" onclick="openQuiz()">
🧠クイズ
</button>

</div>

<div class="card">

1分あたり
<input id="per" type="number" value="60">

1日の目標
<input id="goal" type="number" value="3000">

達成率
<span id="percent">0</span>%

<div class="bar">
<div class="fill" id="fill"></div>
</div>

</div>

<div class="card">
<h3>🌈 段階演出</h3>
<div id="ach"></div>
</div>

</div>

<!-- 御祈念 -->

<div id="prayerPage" style="display:none">

<div class="card">

<h3>🙏御祈念</h3>

<textarea
id="prayer"
maxlength="300"
placeholder="御祈念内容を入力"></textarea>

<button class="startBtn" onclick="savePrayer()">
保存
</button>

<button class="navBtn" onclick="backHome()">
戻る
</button>

<div id="prayerList"></div>

</div>
</div>

<!-- クイズ -->

<div id="quizPage" style="display:none">

<div class="card">

<h3>🧠 脳スッキリクイズ</h3>

<div id="quizList"></div>

<button class="startBtn" onclick="submitQuiz()">
答え合わせ
</button>

<button class="quizBtn" onclick="generateQuiz()">
問題変更
</button>

<button class="navBtn" onclick="backHome()">
戻る
</button>

<div id="quizResult"></div>

</div>
</div>

<script>

/* ================= DOM ================= */

const main = document.getElementById("main");
const prayerPage = document.getElementById("prayerPage");
const prayerList = document.getElementById("prayerList");
const prayer = document.getElementById("prayer");

const quizPage = document.getElementById("quizPage");
const quizList = document.getElementById("quizList");
const quizResult = document.getElementById("quizResult");

const clock = document.getElementById("clock");
const startTime = document.getElementById("startTime");

const daily = document.getElementById("daily");
const monthly = document.getElementById("monthly");
const total = document.getElementById("total");

const btn = document.getElementById("btn");

const per = document.getElementById("per");
const goal = document.getElementById("goal");

const percent = document.getElementById("percent");
const fill = document.getElementById("fill");

const bestScore = document.getElementById("bestScore");

const space = document.getElementById("space");

/* ================= JST ================= */

const JST_TIME_ZONE = "Asia/Tokyo";

const jstDateTimeFormatter =
new Intl.DateTimeFormat("ja-JP",{
  timeZone:JST_TIME_ZONE,
  year:"numeric",
  month:"2-digit",
  day:"2-digit",
  hour:"2-digit",
  minute:"2-digit",
  second:"2-digit",
  hour12:false
});

function formatJSTDateTime(value){

  if(!value) return "未開始";

  const d =
    value instanceof Date
    ? value
    : new Date(value);

  return jstDateTimeFormatter.format(d)
    + " JST";
}

/* ================= 保存キー ================= */

const KEY = "dx_all_final_v5";
const PRAY = "dx_pray_final_v5";
const QUIZ = "dx_quiz_score_v5";

/* ================= 状態 ================= */

let state =
JSON.parse(localStorage.getItem(KEY))
||{
  daily:0,
  monthly:0,
  total:0,
  start:0,
  fixedStart:0,
  running:false,
  per:60,
  done:false
};

let quizScore =
JSON.parse(localStorage.getItem(QUIZ))
||{
  best:0
};

let stage = {};

let quizData = [];
let quizSelections = [];
let quizAnswered = false;

/* ================= 保存 ================= */

function save(){
  localStorage.setItem(KEY,JSON.stringify(state));
}

function saveQuiz(){
  localStorage.setItem(QUIZ,JSON.stringify(quizScore));
}

/* ================= 時間 ================= */

function createTimePair(){

  const now = Date.now();

  return{
    sentAt:formatJSTDateTime(now),
    receivedAt:formatJSTDateTime(now)
  };
}

function buildTimeMetaHTML(sentAt,receivedAt){

  return `
  <div class="timeMeta">
    <span class="inlineTime">
      📤送信: ${sentAt}
    </span>

    <span class="inlineTime">
      📥受信: ${receivedAt}
    </span>
  </div>
  `;
}

/* ================= カウント ================= */

function get(){

  if(!state.running) return state;

  let sec =
    (Date.now()-state.start)/1000;

  let add =
    sec*(state.per/60);

  return{
    daily:state.daily+add,
    monthly:state.monthly+add,
    total:state.total+add
  };
}

/* ================= UI ================= */

function ui(){

  let c = get();

  daily.textContent =
    Math.floor(c.daily);

  monthly.textContent =
    Math.floor(c.monthly);

  total.textContent =
    Math.floor(c.total);

  if(state.fixedStart){

    startTime.textContent =
      formatJSTDateTime(state.fixedStart);

  }else{

    startTime.textContent = "未開始";
  }

  btn.textContent =
    state.running
    ? "⏹停止"
    : "▶開始";

  bestScore.textContent =
    quizScore.best;

  per.value =
    state.per || 60;

  let g =
    Number(goal.value || 1);

  let p =
    Math.min(
      100,
      Math.floor((c.daily/g)*100)
    );

  percent.textContent = p;

  fill.style.width = p + "%";

  checkDaily(c);
  checkStage(c.total);

  save();
}

/* ================= 時計 ================= */

function updateClock(){

  clock.textContent =
    formatJSTDateTime(Date.now());

  ui();
}

updateClock();

setInterval(updateClock,1000);

/* ================= 開始停止 ================= */

function toggle(){

  state.per =
    Number(per.value || 60);

  if(!state.running){

    const now = Date.now();

    state.running = true;

    state.start = now;

    if(!state.fixedStart){
      state.fixedStart = now;
    }

    startTime.textContent =
      formatJSTDateTime(state.fixedStart);

    btn.textContent = "⏹停止";

    save();

    return;

  }else{

    let c = get();

    state.daily = c.daily;
    state.monthly = c.monthly;
    state.total = c.total;

    state.running = false;

    btn.textContent = "▶開始";

    save();
  }

  ui();
}

/* ================= リセット ================= */

function resetDay(){

  state.daily = 0;
  state.done = false;

  state.fixedStart = 0;

  save();

  ui();
}

function resetMonth(){

  state.monthly = 0;

  save();

  ui();
}

function resetTotal(){

  state.total = 0;

  save();

  ui();
}

/* ================= 達成 ================= */

function checkDaily(c){

  let g =
    Number(goal.value || 1);

  if(state.done) return;

  if(c.daily >= g){

    state.done = true;

    save();

    add("🌅 1日の目標達成！");

    screenFX();
  }
}

/* ================= 演出 ================= */

function screenFX(){

  document.body.classList.add(
    "flash",
    "shake"
  );

  setTimeout(()=>{
    document.body.classList.remove("shake");
  },2000);

  setTimeout(()=>{
    document.body.classList.remove("flash");
  },5000);
}

function add(text){

  let box =
    document.getElementById("ach");

  if(!box) return;

  const timePair =
    createTimePair();

  let d =
    document.createElement("div");

  d.className = "ach";

  d.innerHTML = `
    <div>${text}</div>
    ${buildTimeMetaHTML(
      timePair.sentAt,
      timePair.receivedAt
    )}
  `;

  box.prepend(d);
}

/* ================= 段階 ================= */

function checkStage(t){

  if(t>=10000 && !stage[10000]){
    stage[10000]=1;
    add("🥁 大地：スタート");
    screenFX();
  }

  if(t>=50000 && !stage[50000]){
    stage[50000]=1;
    add("🎀 葵：いい感じ");
    screenFX();
  }

  if(t>=100000 && !stage[100000]){
    stage[100000]=1;
    add("🎸 蓮：積み重ね");
    screenFX();
  }

  if(t>=200000 && !stage[200000]){
    stage[200000]=1;
    add("🎤 結衣：届いた");
    screenFX();
  }

  if(t>=500000 && !stage[500000]){
    stage[500000]=1;
    add("🎹 悠真：すごい");
    screenFX();
  }
}

/* ================= 宇宙 ================= */

function createSpace(){

  space.style.display = "block";

  space.innerHTML = "";

  for(let i=0;i<120;i++){

    let s =
      document.createElement("div");

    s.className = "star";

    s.style.left =
      Math.random()*100 + "%";

    s.style.top =
      Math.random()*100 + "%";

    space.appendChild(s);
  }
}

/* ================= 画面切替 ================= */

function hideAllPages(){

  main.style.display = "none";
  prayerPage.style.display = "none";
  quizPage.style.display = "none";
}

function backHome(){

  hideAllPages();

  main.style.display = "block";
}

function openPrayer(){

  hideAllPages();

  prayerPage.style.display = "block";

  renderPrayer();
}

function openQuiz(){

  hideAllPages();

  quizPage.style.display = "block";

  generateQuiz();
}

/* ================= 御祈念 ================= */

function savePrayer(){

  let list =
    JSON.parse(
      localStorage.getItem(PRAY)
      || "[]"
    );

  if(!prayer.value.trim()){

    alert("入力してください");

    return;
  }

  const timePair =
    createTimePair();

  list.unshift({
    text:prayer.value,
    date:timePair.sentAt,
    ok:false
  });

  localStorage.setItem(
    PRAY,
    JSON.stringify(list)
  );

  prayer.value = "";

  renderPrayer();
}

function renderPrayer(){

  let list =
    JSON.parse(
      localStorage.getItem(PRAY)
      || "[]"
    );

  prayerList.innerHTML = "";

  list.forEach((x,i)=>{

    let d =
      document.createElement("div");

    d.className = "ach";

    d.innerHTML = `
      <div>${x.date}</div>
      <div>🙏 ${x.text}</div>

      <button onclick="toggleOk(${i})"
      style="
      background:${x.ok?'red':'#ccc'};
      border-radius:50%;
      width:40px;
      height:40px;
      color:white;
      ">◎</button>

      <button onclick="delPrayer(${i})">
      削除
      </button>
    `;

    prayerList.appendChild(d);
  });
}

function toggleOk(i){

  let list =
    JSON.parse(
      localStorage.getItem(PRAY)
      || "[]"
    );

  list[i].ok = !list[i].ok;

  localStorage.setItem(
    PRAY,
    JSON.stringify(list)
  );

  renderPrayer();
}

function delPrayer(i){

  let list =
    JSON.parse(
      localStorage.getItem(PRAY)
      || "[]"
    );

  list.splice(i,1);

  localStorage.setItem(
    PRAY,
    JSON.stringify(list)
  );

  renderPrayer();
}

/* ================= クイズ ================= */

const questions = [

{
q:"AIの意味は？",
a:"Artificial Intelligence",
c:[
"Automatic Input",
"Artificial Intelligence",
"Advanced Internet",
"Active Icon"
]
},

{
q:"Wi-Fiは何？",
a:"無線通信",
c:[
"無線通信",
"冷蔵機能",
"音量機能",
"印刷機能"
]
},

{
q:"URLは？",
a:"Web上の住所",
c:[
"電池",
"CPU",
"Web上の住所",
"音量"
]
},

{
q:"OSの例は？",
a:"Windows",
c:[
"PNG",
"USB",
"Windows",
"PDF"
]
},

{
q:"検索エンジンは？",
a:"Google",
c:[
"Excel",
"Google",
"Paint",
"Bluetooth"
]
}

];

function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5);
}

function generateQuiz(){

  quizData =
    shuffle(questions).slice(0,5);

  quizSelections =
    [null,null,null,null,null];

  quizAnswered = false;

  quizResult.innerHTML = "";

  renderQuiz();
}

function renderQuiz(){

  quizList.innerHTML = "";

  quizData.forEach((q,i)=>{

    let div =
      document.createElement("div");

    div.className = "quizItem";

    let choices =
      shuffle([...q.c]);

    q.currentChoices = choices;

    div.innerHTML = `
      <div class="quizQuestion">
      Q${i+1}. ${q.q}
      </div>

      ${choices.map((x,idx)=>`
      <button
      class="choiceBtn"
      onclick="selectChoice(${i},${idx})">
      ${idx+1}. ${x}
      </button>
      `).join("")}
    `;

    quizList.appendChild(div);
  });
}

function selectChoice(qi,ci){

  if(quizAnswered) return;

  quizSelections[qi] = ci;
}

function submitQuiz(){

  if(quizAnswered) return;

  quizAnswered = true;

  let score = 0;

  let html = "";

  quizData.forEach((q,i)=>{

    let idx =
      quizSelections[i];

    let selected =
      q.currentChoices[idx];

    if(selected === q.a){

      score++;

      html += `
      <div class="ach">
      ✅ Q${i+1} 正解
      </div>
      `;

    }else{

      html += `
      <div class="ach">
      ❌ Q${i+1}
      正解: ${q.a}
      </div>
      `;
    }
  });

  if(score > quizScore.best){

    quizScore.best = score;

    saveQuiz();
  }

  quizResult.innerHTML = `
    <div class="quizResult">
      結果 ${score}/5
    </div>

    ${html}
  `;

  ui();

  screenFX();
}

/* ================= 初期表示 ================= */

ui();

</script>

</body>
</html>
