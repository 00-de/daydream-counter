<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>題目カウンター DayDreamプラス DX+</title>

<!-- 📄 PDFライブラリ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  padding:20px;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffb6f9,#b5d7ff,#ffe59e);
}

h1{text-align:center;}

.card{
  background:#fff;
  padding:18px;
  border-radius:20px;
  margin-bottom:15px;
  box-shadow:0 6px 14px rgba(0,0,0,.15);
}

button{
  border:none;
  padding:10px 12px;
  border-radius:10px;
  margin:4px;
  font-weight:bold;
  cursor:pointer;
}

.startBtn{background:#00c853;color:#fff;}
.resetBtn{background:#ff7043;color:#fff;}
.navBtn{background:#7c4dff;color:#fff;}

input,textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  box-sizing:border-box;
}

.bar{
  height:24px;
  background:#ddd;
  border-radius:999px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00e676,#00b0ff,#ff00aa);
}

.hidden{display:none;}

.achievement{
  margin-top:10px;
  padding:12px;
  background:#fff3cd;
  border-radius:14px;
  font-weight:bold;
  animation:pop .4s ease;
}

.historyItem{
  padding:10px;
  margin-top:10px;
  background:#f5f5f5;
  border-radius:12px;
}

@keyframes pop{
  0%{transform:scale(.7);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}

/* 🌌 宇宙MV */
#space{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  overflow:hidden;
  z-index:9999;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  animation:move linear infinite;
}

@keyframes move{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}

.mvText{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:28px;
  font-weight:bold;
  text-align:center;
}
</style>
</head>

<body>

<h1>🌈 題目カウンター DayDreamプラス DX+</h1>

<!-- ===== MAIN ===== -->
<div id="main">

<div class="card">
<div>⏰ <span id="clock"></span></div>
<div>🚀 <span id="startTime">未開始</span></div>
<hr>
<div>📅 日 <span id="daily">0</span></div>
<div>🗓️ 月 <span id="monthly">0</span></div>
<div>🏆 総 <span id="total">0</span></div>
</div>

<div class="card">

<button class="startBtn" onclick="toggle()" id="btn">▶開始</button>

<button class="resetBtn" onclick="resetDay()">日リセット</button>
<button class="resetBtn" onclick="resetMonth()">月リセット</button>
<button class="resetBtn" onclick="resetTotal()">総リセット</button>

<button class="navBtn" onclick="openPrayer()">🙏御祈念</button>

</div>

<div class="card">

<label>1分あたり</label>
<input id="perMinute" type="number" value="60">

<label>目標</label>
<input id="goal" type="number" value="3000">

<div>達成率 <span id="percent">0</span>%</div>
<div class="bar"><div class="fill" id="fill"></div></div>

</div>

<div class="card">
<h3>🌈 演出</h3>
<div id="achievement"></div>
</div>

</div>

<!-- ===== PRAYER ===== -->
<div id="prayerPage" class="hidden">

<div class="card">
<h2>🙏 御祈念</h2>

<textarea id="text" maxlength="300" rows="5"></textarea>

<button class="startBtn" onclick="savePrayer()">保存</button>
<button class="navBtn" onclick="shareText()">📤共有</button>
<button class="startBtn" onclick="downloadPDF()">📄PDF</button>
<button class="navBtn" onclick="back()">戻る</button>

</div>

<div class="card">
<h3>📖 御祈念履歴</h3>
<div id="list"></div>
</div>

</div>

<!-- ===== SPACE ===== -->
<div id="space">
  <div class="mvText">🏆 1,000,000達成<br>DAYDREAM 完全覚醒</div>
</div>

<script>

const STORAGE="dx_v1";
const PRAYER="dx_prayer_v1";

/* ===== STATE ===== */
let state=JSON.parse(localStorage.getItem(STORAGE))||{
  daily:0,
  monthly:0,
  total:0,
  start:0,
  fixedStart:0,
  running:false,
  perMinute:60,
  goalDone:false,
  stage:{10000:false,50000:false,100000:false,200000:false,500000:false,700000:false,1000000:false}
};

/* ===== SAVE ===== */
function save(){
  localStorage.setItem(STORAGE,JSON.stringify(state));
}

/* ===== COUNT ===== */
function get(){
  if(!state.running||!state.start)return state;

  let sec=(Date.now()-state.start)/1000;
  let add=sec*(state.perMinute/60);

  return{
    daily:state.daily+add,
    monthly:state.monthly+add,
    total:state.total+add
  };
}

/* ===== UI ===== */
function ui(){

  let c=get();

  daily.textContent=Math.floor(c.daily);
  monthly.textContent=Math.floor(c.monthly);
  total.textContent=Math.floor(c.total);

  startTime.textContent=
    state.fixedStart?new Date(state.fixedStart).toLocaleString():"未開始";

  let goal=+document.getElementById("goal").value||1;
  let p=Math.min(100,Math.floor(c.daily/goal*100));

  percent.textContent=p;
  fill.style.width=p+"%";

  checkStage(c.total);
}

/* ===== CLOCK ===== */
setInterval(()=>{
  clock.textContent=new Date().toLocaleString();
  ui();
},1000);

/* ===== START ===== */
function toggle(){

  state.perMinute=+perMinute.value;

  if(!state.running){
    state.running=true;
    state.start=Date.now();
    state.fixedStart=Date.now();
    btn.textContent="停止";
  }else{

    let c=get();
    state.daily=c.daily;
    state.monthly=c.monthly;
    state.total=c.total;

    state.running=false;
    btn.textContent="開始";
  }

  save();
}

/* ===== STAGE ===== */
function checkStage(t){

  let s=state.stage;

  if(t>=10000&&!s[10000]){s[10000]=true;add("🥁大地");}
  if(t>=50000&&!s[50000]){s[50000]=true;add("🎀葵");}
  if(t>=100000&&!s[100000]){s[100000]=true;add("🎸蓮");}
  if(t>=200000&&!s[200000]){s[200000]=true;add("🎤結衣");}
  if(t>=500000&&!s[500000]){s[500000]=true;add("🎹悠真");}
  if(t>=700000&&!s[700000]){s[700000]=true;add("🌌接近");}

  if(t>=1000000&&!s[1000000]){
    s[1000000]=true;
    add("🏆覚醒");
    spaceMode();
  }

  save();
}

/* ===== ADD ===== */
function add(t){
  let d=document.createElement("div");
  d.className="achievement";
  d.textContent=t;
  achievement.prepend(d);
}

/* ===== RESET ===== */
function resetDay(){state.daily=0;save();}
function resetMonth(){state.monthly=0;save();}
function resetTotal(){state.total=0;save();}

/* ===== PRAYER ===== */
function openPrayer(){
  main.classList.add("hidden");
  prayerPage.classList.remove("hidden");
  render();
}

function back(){
  main.classList.remove("hidden");
  prayerPage.classList.add("hidden");
}

/* ===== SAVE PRAYER ===== */
function savePrayer(){

  let t=text.value.trim();
  if(!t)return;

  let list=JSON.parse(localStorage.getItem(PRAYER))||[];

  list.unshift({d:new Date().toLocaleString(),t,ok:false});

  localStorage.setItem(PRAYER,JSON.stringify(list));

  text.value="";
  render();
}

/* ===== RENDER ===== */
function render(){

  let list=JSON.parse(localStorage.getItem(PRAYER))||[];
  let el=document.getElementById("list");

  el.innerHTML="";

  list.forEach((x,i)=>{

    let d=document.createElement("div");
    d.className="historyItem";

    d.innerHTML=`
      <div>${x.d}</div>
      <div>🙏 ${x.t}</div>

      <button onclick="toggleOk(${i})" style="color:${x.ok?'red':''}">◎</button>
      <button onclick="del(${i})">削除</button>
    `;

    el.appendChild(d);
  });
}

/* ===== ◎ ===== */
function toggleOk(i){
  let list=JSON.parse(localStorage.getItem(PRAYER))||[];
  list[i].ok=!list[i].ok;
  localStorage.setItem(PRAYER,JSON.stringify(list));
  render();
}

/* ===== DELETE ===== */
function del(i){
  let list=JSON.parse(localStorage.getItem(PRAYER))||[];
  list.splice(i,1);
  localStorage.setItem(PRAYER,JSON.stringify(list));
  render();
}

/* ===== SHARE ===== */
function shareText(){

  let list=JSON.parse(localStorage.getItem(PRAYER))||[];

  let txt="🙏御祈念\n\n";

  list.forEach(x=>{
    txt+=x.d+"\n"+x.t+"\n\n";
  });

  if(navigator.share){
    navigator.share({text:txt});
  }else{
    navigator.clipboard.writeText(txt);
    alert("コピーしました");
  }
}

/* ===== PDF ===== */
function downloadPDF(){

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();

  let list=JSON.parse(localStorage.getItem(PRAYER))||[];

  let y=10;

  doc.text("DayDream御祈念",10,y);
  y+=10;

  list.forEach(x=>{
    doc.text(String(x.d),10,y);y+=7;
    doc.text(String(x.t),10,y);y+=10;
  });

  doc.save("prayer.pdf");
}

/* ===== SPACE ===== */
function spaceMode(){

  let s=document.getElementById("space");
  s.style.display="block";

  for(let i=0;i<120;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.left=Math.random()*100+"vw";
    star.style.animationDuration=(Math.random()*3+2)+"s";
    s.appendChild(star);
  }

  if(s.requestFullscreen)s.requestFullscreen();
}

</script>

</body>
</html>
